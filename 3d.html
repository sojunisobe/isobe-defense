<script>
"use strict";
/* ============================================================================
   HUMANITY DEFENSE 205X — 3D MVP（Three.js）
   フェーズ①3D基盤＋②ロジック移植：フローフィールド迷路TDを3D化
   人類防衛軍 HDF（味方タワー） vs 暴走AI ZERO（敵・右→左へ侵攻）
   ※2D版(index.html)はそのまま。これは方向性/性能確認用のMVP。
   ============================================================================ */
const THREEOK = (typeof THREE!=='undefined');

// ---- 盤面定数 ----
const COLS=24, ROWS=13, CELL=1.4;   // マス1.5倍
const WW=COLS*CELL, WD=ROWS*CELL;
const GOAL_C=0, BASE_R=Math.floor(ROWS/2);
const SPAWN_C=COLS-1, SPAWN_R=Math.floor(ROWS/2);
const idx=(c,r)=>r*COLS+c;
function cellToWorld(c,r){ return {x:(c+0.5)*CELL-WW/2, z:(r+0.5)*CELL-WD/2}; }
function worldToCell(x,z){ return {c:Math.floor((x+WW/2)/CELL), r:Math.floor((z+WD/2)/CELL)}; }
const inGrid=(c,r)=>c>=0&&r>=0&&c<COLS&&r<ROWS;

// ---- 状態 ----
const occ=new Uint8Array(COLS*ROWS);          // 1=タワー(壁)
const distF=new Int32Array(COLS*ROWS);
const flowC=new Float32Array(COLS*ROWS), flowR=new Float32Array(COLS*ROWS);
const G={ scene:'title', parts:200, hp:100, hpMax:100, wave:0, score:0, kills:0, combo:0, comboT:0,
  speed:1, paused:false, sel:'gun', towers:[], enemies:[], shots:[], fx:[],
  spawnQueue:[], spawnTimer:0, waveActive:false, betweenT:3, flowDirty:true };

// ---- 兵器定義（MVP 3種）----
const TOWERS=[
  {key:'gun',   name:'GUN',    cost:60,  range:3.6, dmg:8,  cd:0.30, color:0x6fdf4a, splash:0,   slow:0},   // くすんだティール
  {key:'cannon',name:'CANNON', cost:110, range:3.4, dmg:34, cd:1.10, color:0xff5a3a, splash:1.6, slow:0},   // 燻んだ琥珀/真鍮
  {key:'frost', name:'FROST',  cost:90,  range:3.2, dmg:5,  cd:0.65, color:0x4a9fff, splash:0,   slow:0.5}, // 寒色スチール
  {key:'sniper',name:'SNIPER', cost:130, range:5.6, dmg:62, cd:1.70, color:0xffb24a, splash:0,   slow:0},
  {key:'mortar',name:'MORTAR', cost:120, range:4.0, dmg:26, cd:1.50, color:0xffae42, splash:2.2, slow:0},
  {key:'laser', name:'LASER',  cost:140, range:3.9, dmg:13, cd:0.38, color:0xb04dff, splash:0,   slow:0},
  {key:'tesla', name:'TESLA',  cost:110, range:3.3, dmg:10, cd:0.55, color:0x18d0ff, splash:0,   slow:0, chain:3},
];
const TOWER_BY_KEY={}; TOWERS.forEach(t=>TOWER_BY_KEY[t.key]=t);

// ---- 敵アーキタイプ（MVP）----
const ENEMIES=[
  {key:'grunt', hp:34,  speed:1.9, reward:7,  scale:0.62, color:0x7a2f3a, dmg:5},
  {key:'runner',hp:22,  speed:3.0, reward:8,  scale:0.5,  color:0x4e3318, dmg:4},
  {key:'tank',  hp:120, speed:1.1, reward:16, scale:0.9,  color:0x55243c, dmg:9},
];

/* ====================== フローフィールド ====================== */
const _q=new Int32Array(COLS*ROWS);
function buildFlow(){
  distF.fill(-1); let head=0,tail=0;
  for(let r=0;r<ROWS;r++){ const i=idx(GOAL_C,r); if(!occ[i]){ distF[i]=0; _q[tail++]=i; } }
  while(head<tail){ const i=_q[head++]; const c=i%COLS, r=(i/COLS)|0, d=distF[i]+1;
    if(c+1<COLS){const j=i+1;   if(!occ[j]&&distF[j]<0){distF[j]=d;_q[tail++]=j;}}
    if(c-1>=0){ const j=i-1;    if(!occ[j]&&distF[j]<0){distF[j]=d;_q[tail++]=j;}}
    if(r+1<ROWS){const j=i+COLS;if(!occ[j]&&distF[j]<0){distF[j]=d;_q[tail++]=j;}}
    if(r-1>=0){ const j=i-COLS; if(!occ[j]&&distF[j]<0){distF[j]=d;_q[tail++]=j;}}
  }
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){ const i=idx(c,r); flowC[i]=0; flowR[i]=0;
    if(distF[i]<0) continue; let best=distF[i],bc=0,br=0;
    if(c+1<COLS&&distF[i+1]>=0&&distF[i+1]<best){best=distF[i+1];bc=1;br=0;}
    if(c-1>=0 &&distF[i-1]>=0&&distF[i-1]<best){best=distF[i-1];bc=-1;br=0;}
    if(r+1<ROWS&&distF[i+COLS]>=0&&distF[i+COLS]<best){best=distF[i+COLS];bc=0;br=1;}
    if(r-1>=0 &&distF[i-COLS]>=0&&distF[i-COLS]<best){best=distF[i-COLS];bc=0;br=-1;}
    flowC[i]=bc; flowR[i]=br;
  }
}
const _seen=new Uint8Array(COLS*ROWS);
function reachableAfter(c,r){ // そのマスに壁を置いても spawn→base が繋がるか
  const i0=idx(c,r); const was=occ[i0]; occ[i0]=1;
  _seen.fill(0); let head=0,tail=0,ok=false;
  for(let rr=0;rr<ROWS;rr++){ const i=idx(GOAL_C,rr); if(!occ[i]){_seen[i]=1;_q[tail++]=i;} }
  while(head<tail){ const i=_q[head++]; const cc=i%COLS, rr=(i/COLS)|0;
    if(cc===SPAWN_C&&rr===SPAWN_R){ok=true;break;}
    const nb=[i+1,i-1,i+COLS,i-COLS], cs=[cc+1,cc-1,cc,cc], rs=[rr,rr,rr+1,rr-1];
    for(let k=0;k<4;k++){ if(cs[k]<0||cs[k]>=COLS||rs[k]<0||rs[k]>=ROWS)continue; const j=nb[k];
      if(!occ[j]&&!_seen[j]){_seen[j]=1;_q[tail++]=j;} } }
  occ[i0]=was; return ok;
}
function cellFree(c,r){ if(!inGrid(c,r))return false;
  if(c===GOAL_C&&r===BASE_R)return false; if(c===SPAWN_C&&r===SPAWN_R)return false;
  return !occ[idx(c,r)]; }

/* ====================== Three.js シーン ====================== */
let renderer,scene,camera,raycaster,groundMesh,baseMesh,spawnMesh,composer,bloomPass,envTex;
let camR=32, camTheta=0.0, camPhi=0.92; const camTarget={x:0,y:0.6,z:0};
const tmpV=THREEOK?new THREE.Vector3():null, ndc=THREEOK?new THREE.Vector2():null;


let _grunge=null;
function grungeTex(){ if(_grunge) return _grunge;
  const cv=document.createElement('canvas'); cv.width=256; cv.height=256; const g=cv.getContext('2d');
  g.fillStyle='#c8c8c8'; g.fillRect(0,0,256,256);
  for(let i=0;i<70;i++){ const x=Math.random()*256,y=Math.random()*256,r=8+Math.random()*44; const v=(60+Math.random()*90)|0; g.fillStyle='rgba('+v+','+v+','+v+',0.32)'; g.beginPath(); g.ellipse(x,y,r,r*(0.55+Math.random()*0.7),Math.random()*6,0,7); g.fill(); }
  for(let i=0;i<46;i++){ const x=Math.random()*256,y=Math.random()*256; const w=1+Math.random()*3, hh=18+Math.random()*120; const v=(55+Math.random()*55)|0; g.fillStyle='rgba('+v+','+((v*0.82)|0)+','+((v*0.66)|0)+',0.26)'; g.fillRect(x,y,w,hh); }
  for(let i=0;i<140;i++){ g.fillStyle='rgba(235,235,235,'+(0.08+Math.random()*0.18)+')'; g.fillRect(Math.random()*256,Math.random()*256,1+Math.random()*2,1+Math.random()*2); }
  for(let i=0;i<2400;i++){ const v=Math.random()<0.5?40:215; g.fillStyle='rgba('+v+','+v+','+v+',0.05)'; g.fillRect(Math.random()*256,Math.random()*256,1,1); }
  const tx=new THREE.CanvasTexture(cv); tx.wrapS=tx.wrapT=THREE.RepeatWrapping; tx.repeat.set(1.7,1.7); _grunge=tx; return tx;
}
function battlefieldTexture(){
  const cv=document.createElement('canvas'); cv.width=512; cv.height=512; const g=cv.getContext('2d');
  g.fillStyle='#2a261e'; g.fillRect(0,0,512,512);
  const cols=['#332e23','#221d16','#3a3328','#1d1912','#2e2a20'];
  for(let i=0;i<240;i++){ const x=Math.random()*512,y=Math.random()*512,r=10+Math.random()*64; g.globalAlpha=0.4; g.fillStyle=cols[i%cols.length]; g.beginPath(); g.ellipse(x,y,r,r*(0.55+Math.random()*0.7),Math.random()*6,0,7); g.fill(); }
  g.globalAlpha=1;
  for(let i=0;i<28;i++){ const x=Math.random()*512,y=Math.random()*512,r=16+Math.random()*46; const rg=g.createRadialGradient(x,y,2,x,y,r); rg.addColorStop(0,'rgba(7,6,5,0.82)'); rg.addColorStop(1,'rgba(7,6,5,0)'); g.fillStyle=rg; g.beginPath(); g.arc(x,y,r,0,7); g.fill(); }
  for(let i=0;i<600;i++){ g.globalAlpha=0.5; g.fillStyle=Math.random()<0.5?'#141009':'#4a4233'; g.fillRect(Math.random()*512,Math.random()*512,1+Math.random()*3,1+Math.random()*2); }
  g.globalAlpha=1;
  const tx=new THREE.CanvasTexture(cv); tx.wrapS=tx.wrapT=THREE.RepeatWrapping; tx.repeat.set(5,5); tx.anisotropy=4; return tx;
}
function gridTexture(){
  const cv=document.createElement('canvas'); cv.width=COLS*32; cv.height=ROWS*32; const g=cv.getContext('2d');
  g.fillStyle='#0c1622'; g.fillRect(0,0,cv.width,cv.height);
  for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++){ if((c+r)%2===0){ g.fillStyle='rgba(120,160,200,0.05)'; g.fillRect(c*32,r*32,32,32); } }
  g.strokeStyle='rgba(110,170,210,0.5)'; g.lineWidth=1.5;
  for(let c=0;c<=COLS;c++){ g.beginPath(); g.moveTo(c*32,0); g.lineTo(c*32,cv.height); g.stroke(); }
  for(let r=0;r<=ROWS;r++){ g.beginPath(); g.moveTo(0,r*32); g.lineTo(cv.width,r*32); g.stroke(); }
  const tx=new THREE.CanvasTexture(cv); tx.anisotropy=4; return tx;
}
function initScene(){
  const cv=document.getElementById('cv');
  renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true});
  renderer.setPixelRatio(Math.min(2,window.devicePixelRatio||1));
  renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.outputEncoding=THREE.sRGBEncoding;                 // 正しい色空間
  renderer.toneMapping=THREE.NoToneMapping;           // ACES廃止＝当たった面が脱色して白くならない
  renderer.toneMappingExposure=1.0;                          // 露出を下げて白飛び回避＝色が乗る
  scene=new THREE.Scene(); scene.background=new THREE.Color(0x05070c); scene.fog=new THREE.Fog(0x05070c, 38, 160);
  camera=new THREE.PerspectiveCamera(46, 1, 0.1, 200);
  raycaster=new THREE.Raycaster();
  // IBL環境マップ（金属の反射＝写実感の要）
  try{ const pmrem=new THREE.PMREMGenerator(renderer); envTex=pmrem.fromScene(new THREE.RoomEnvironment(renderer),0.04).texture; scene.environment=null; void envTex; }catch(e){}
  // ライト（キー＋フィル＋リム、ソフトシャドウ）
  scene.add(new THREE.AmbientLight(0x33404f, 0.22));
  scene.add(new THREE.HemisphereLight(0x5a708a, 0x0a0e16, 0.25));
  const key=new THREE.DirectionalLight(0xdfe6ee, 1.0); key.position.set(-10,18,12); key.castShadow=true;
  key.shadow.mapSize.set(2048,2048); key.shadow.radius=5; key.shadow.bias=-0.0004;
  key.shadow.camera.left=-WW; key.shadow.camera.right=WW; key.shadow.camera.top=WD; key.shadow.camera.bottom=-WD; key.shadow.camera.near=1; key.shadow.camera.far=70;
  scene.add(key);
  const rim=new THREE.DirectionalLight(0x3a6a9a, 0.45); rim.position.set(12,8,-14); scene.add(rim);
  const fill=new THREE.PointLight(0x7a2f3a, 0.12, 30); fill.position.set(WW/2,6,0); scene.add(fill);   // スポーン側の赤フィル
  // 地面（暗いコンクリ）＋セル境界に正確一致した3Dグリッド線（敵/タワーはマス中央に乗る）
  const _gt=battlefieldTexture(); _gt.encoding=THREE.sRGBEncoding; groundMesh=new THREE.Mesh(new THREE.PlaneGeometry(WW,WD,1,1), new THREE.MeshStandardMaterial({map:_gt,color:0xffffff,roughness:0.98,metalness:0.0,envMapIntensity:0.05}));
  groundMesh.rotation.x=-Math.PI/2; groundMesh.receiveShadow=true; scene.add(groundMesh);
  { const gv=[]; for(let c=0;c<=COLS;c++){ const x=c*CELL-WW/2; gv.push(x,0.02,-WD/2,x,0.02,WD/2);} for(let r=0;r<=ROWS;r++){ const z=r*CELL-WD/2; gv.push(-WW/2,0.02,z,WW/2,0.02,z);}
    const gGeo=new THREE.BufferGeometry(); gGeo.setAttribute('position',new THREE.Float32BufferAttribute(gv,3));
    scene.add(new THREE.LineSegments(gGeo,new THREE.LineBasicMaterial({color:0x4a6a5a,transparent:true,opacity:0.28}))); }
  // 基地（HDF・シアン）
  baseMesh=new THREE.Group(); const bw=cellToWorld(GOAL_C,BASE_R);
  const core=new THREE.Mesh(roundedBox(1.0,1.5,1.0,0.22), pbr(0x16323f,{metalness:0.85,roughness:0.32,emissive:0x0a3a4a,ei:0.5,clearcoat:0.6}));
  core.position.y=0.8; core.castShadow=true; baseMesh.add(core);
  const dome=new THREE.Mesh(new THREE.SphereGeometry(0.5,24,16,0,Math.PI*2,0,Math.PI/2), pbr(0x153a48,{metalness:0.45,roughness:0.5,emissive:0x2fb6dc,ei:0.18,clearcoat:0.1})); dome.position.y=1.55; dome.castShadow=true; baseMesh.add(dome);
  const ring=new THREE.Mesh(new THREE.TorusGeometry(0.9,0.06,12,40), emis(0x2fb6dc,0.85)); ring.position.y=0.95; ring.rotation.x=Math.PI/2; baseMesh.add(ring); baseMesh.userData.ring=ring;
  baseMesh.position.set(bw.x,0,bw.z); scene.add(baseMesh);
  // スポーン（ZERO・レッド）
  spawnMesh=new THREE.Group(); const sw=cellToWorld(SPAWN_C,SPAWN_R);
  const sr=new THREE.Mesh(new THREE.TorusGeometry(0.72,0.06,12,40), emis(0xff3b54,1.6)); sr.rotation.x=Math.PI/2; sr.position.y=0.45; spawnMesh.add(sr); spawnMesh.userData.ring=sr;
  const sr2=new THREE.Mesh(new THREE.TorusGeometry(0.45,0.04,10,32), emis(0xb83a4c,1.2)); sr2.rotation.x=Math.PI/2; sr2.position.y=0.45; spawnMesh.add(sr2);
  spawnMesh.position.set(sw.x,0,sw.z); scene.add(spawnMesh);
  // ポストプロセス（ブルーム＝発光の写実）
  try{
    composer=new THREE.EffectComposer(renderer);
    composer.addPass(new THREE.RenderPass(scene,camera));
    bloomPass=new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth,window.innerHeight), 0.55, 0.35, 0.92);
    composer.addPass(bloomPass);
  }catch(e){ composer=null; }
  buildFlow(); updateCamera(); resize();
}
function updateCamera(){
  const x=camTarget.x+camR*Math.sin(camPhi)*Math.sin(camTheta);
  const y=camTarget.y+camR*Math.cos(camPhi);
  const z=camTarget.z+camR*Math.sin(camPhi)*Math.cos(camTheta);
  camera.position.set(x,y,z); camera.lookAt(camTarget.x,camTarget.y,camTarget.z);
}
function resize(){ const w=window.innerWidth,h=window.innerHeight;
  renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix();
  if(composer){ composer.setSize(w,h); if(bloomPass&&bloomPass.setSize) bloomPass.setSize(w,h); } }
window.addEventListener('resize',()=>{ if(renderer)resize(); });

function pbr(color,o){ o=o||{}; const m=new THREE.MeshPhysicalMaterial({ color:color,
  metalness:(o.metalness==null?0.85:o.metalness), roughness:(o.roughness==null?0.4:o.roughness),
  emissive:(o.emissive||0x000000), emissiveIntensity:(o.ei||0),
  clearcoat:(o.clearcoat||0), clearcoatRoughness:(o.ccr==null?0.4:o.ccr), envMapIntensity:(o.envI==null?0.18:o.envI) }); if(o.grunge) m.map=grungeTex(); return m; }
function emis(color,intensity){ return new THREE.MeshStandardMaterial({ color:0x05070a, emissive:color, emissiveIntensity:(intensity||1.0), metalness:0.2, roughness:0.5 }); }
const MAT=(c,e,ei)=>pbr(c,{emissive:e,ei:ei});
// 角丸ボックス（ExtrudeGeometryのベベルで全エッジを丸める＝箱っぽさ脱却）
function roundedRectShape(w,h,r){ const s=new THREE.Shape(); const x=-w/2,y=-h/2;
  s.moveTo(x+r,y); s.lineTo(x+w-r,y); s.quadraticCurveTo(x+w,y,x+w,y+r);
  s.lineTo(x+w,y+h-r); s.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  s.lineTo(x+r,y+h); s.quadraticCurveTo(x,y+h,x,y+h-r);
  s.lineTo(x,y+r); s.quadraticCurveTo(x,y,x+r,y); return s; }
function roundedBox(w,h,d,r){ r=Math.max(0.02,Math.min(r,Math.min(w,h)/2-0.02)); const bt=Math.max(0.02,Math.min(r,d/2-0.02));
  const geo=new THREE.ExtrudeGeometry(roundedRectShape(w,h,r),{depth:Math.max(0.02,d-2*bt),bevelEnabled:true,bevelThickness:bt,bevelSize:bt,bevelSegments:3,steps:1,curveSegments:6});
  geo.translate(0,0,-(d-2*bt)/2-bt); geo.computeVertexNormals(); return geo; }

function add(parent,mesh,x,y,z,rx,ry,rz){
  mesh.position.set(x||0,y||0,z||0);
  if(rx)mesh.rotation.x=rx; if(ry)mesh.rotation.y=ry; if(rz)mesh.rotation.z=rz;
  mesh.castShadow=true; mesh.receiveShadow=true;
  parent.add(mesh); return mesh;
}
function cyl(r1,r2,h,seg){return new THREE.CylinderGeometry(r1,r2,h,seg||16);}
function box(w,h,d){return new THREE.BoxGeometry(w,h,d);}

  for(var i=0;i<count;i++){

    var b=new THREE.Mesh(cyl(r,r,0.018,6),matBolt);
    if(axis==='y'){ b.rotation.x=Math.PI/2; b.position.set(Math.cos(a)*radius,y,Math.sin(a)*radius);}
    else { b.position.set(Math.cos(a)*radius,y+Math.sin(a)*radius,0); b.rotation.z=Math.PI/2;}
    b.castShadow=true; parent.add(b);
  }
}
// line of bolts/rivets along a panel

function buildMortar(def){

var g=new THREE.Group();

// ===== material palette =====
var matSteel = steel(0x4a4f3a);                 // dark olive-grey main armor
var matSteelD = steel(0x3a3f2e);                // darker steel for recesses
var matDark = pbr(0x23261c,{metalness:0.7,roughness:0.6,grunge:true});      // shadowed steel / breech
var matBolt = pbr(0x6a6a5a,{metalness:0.95,roughness:0.4});                  // bolt heads
var matRubber = pbr(0x16140f,{metalness:0.2,roughness:0.95,grunge:true});    // padding / feet
var matBrass = pbr(0x8a7338,{metalness:1.0,roughness:0.35,grunge:true});     // shell casings
var matCopper= pbr(0x9a6a3a,{metalness:1.0,roughness:0.4});                  // shell driving band
var matCable = pbr(0x1a1c16,{metalness:0.3,roughness:0.9});                  // hydraulic / cables
var matLens  = emis(0xffae42,0.9);              // small amber sensor
var matLensB = emis(0xff7a1a,0.7);              // small ember lens

// ---- helpers (local, no externals) ----
function addBolt(parent,x,y,z,r,rot){
  r=r||0.018;
  var b=new THREE.Mesh(new THREE.CylinderGeometry(r,r,r*0.9,6),matBolt);
  b.castShadow=true; b.position.set(x,y,z);
  if(rot==='x') b.rotation.z=Math.PI/2;
  else if(rot==='z') b.rotation.x=Math.PI/2;
  parent.add(b); return b;
}
function boltRing(parent,cx,cy,cz,radius,count,axis,r){
  for(var i=0;i<count;i++){
    var a=i/count*Math.PI*2;
    if(axis==='z') addBolt(parent,cx+Math.cos(a)*radius,cy+Math.sin(a)*radius,cz,r,'z');
    else if(axis==='y') addBolt(parent,cx+Math.cos(a)*radius,cy,cz+Math.sin(a)*radius,r,null);
  }
}
function panelLine(parent,x,y,z,w,h,d){
  var p=new THREE.Mesh(roundedBox(w,h,d,Math.min(w,h,d)*0.4),matSteelD);

function buildLaser(def){

var g=new THREE.Group();
var STEEL=0x4a2f55, DARK=0x3a2444, METAL=0x5a5560, ACCENT=0xb04dff;

// ---- helpers ----
function bolt(x,y,z,r){var b=new THREE.Mesh(new THREE.CylinderGeometry(r||0.012,r||0.012,0.012,6),pbr(METAL,{metalness:1,roughness:0.5}));b.rotation.x=Math.PI/2;b.position.set(x,y,z);b.castShadow=true;return b;}
function boltRing(parent,cx,cy,cz,rad,n,axis){for(var i=0;i<n;i++){var a=i/n*Math.PI*2;var b;if(axis==='z'){b=bolt(cx+Math.cos(a)*rad,cy+Math.sin(a)*rad,cz);}else{b=new THREE.Mesh(new THREE.CylinderGeometry(0.011,0.011,0.014,6),pbr(METAL,{metalness:1,roughness:0.5}));b.position.set(cx+Math.cos(a)*rad,cy,cz+Math.sin(a)*rad);b.castShadow=true;}parent.add(b);}}
function cable(x1,y1,z1,x2,y2,z2,r){var d=new THREE.Vector3(x2-x1,y2-y1,z2-z1);var len=d.length();var m=new THREE.Mesh(new THREE.CylinderGeometry(r||0.018,r||0.018,len,7),pbr(0x222025,{metalness:0.3,roughness:0.85}));m.position.set((x1+x2)/2,(y1+y2)/2,(z1+z2)/2);m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),d.clone().normalize());m.castShadow=true;return m;}

// =================================================================
// 接地ベース / 履帯風スカート
// =================================================================
var baseMat=steel(STEEL);
var skirt=new THREE.Mesh(roundedBox(0.98,0.18,0.86,0.05),steel(DARK));
skirt.position.y=0.10; skirt.castShadow=true; g.add(skirt);
// 傾斜装甲スカート側面
for(var sx=-1;sx<=1;sx+=2){
  var sl=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.16,0.84),steel(STEEL));
  sl.position.set(sx*0.5,0.12,0); sl.rotation.z=sx*0.18; sl.castShadow=true; g.add(sl);
}
// 履帯ガード（前後の傾斜板）
for(var fz=-1;fz<=1;fz+=2){
  var fp=new THREE.Mesh(new THREE.BoxGeometry(0.9,0.14,0.07),steel(DARK));
  fp.position.set(0,0.11,fz*0.42); fp.rotation.x=fz*0.22; fp.castShadow=true; g.add(fp);
  boltRing(g,0,0.11,fz*0.45,0,1,'z');
  for(var bxx=-0.32;bxx<=0.32;bxx+=0.16){ g.add(bolt(bxx,0.11,fz*0.44)); }
}
// 走行輪（横の小ホイール群）
for(var ws=-1;ws<=1;ws+=2){
  for(var wz=-0.3;wz<=0.31;wz+=0.15){
    var wh=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.07,0.05,12),pbr(0x1a181c,{metalness:0.4,roughness:0.9}));
    wh.rotation.z=Math.PI/2; wh.position.set(ws*0.5,0.06,wz); wh.castShadow=true; g.add(wh);
    var hub=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,0.055,8),pbr(METAL,{metalness:1,roughness:0.5}));
    hub.rotation.z=Math.PI/2; hub.position.set(ws*0.51,0.06,wz); hub.castShadow=true; g.add(hub);
  }
}

// =================================================================
// 車体上部 / 旋回リング（ターレット台座）
// =================================================================
var hull=new THREE.Mesh(roundedBox(0.84,0.16,0.72,0.04),baseMat);
hull.position.y=0.27; hull.castShadow=true; g.add(hull);
// 前面傾斜装甲
var glacis=new THREE.Mesh(new THREE.BoxGeometry(0.8,0.04,0.22),steel(STEEL));
glacis.position.set(0,0.255,0.32); glacis.rotation.x=-0.5; glacis.castShadow=true; g.add(glacis);
// パネルライン溝（細い暗いバー）
for(var pl=-0.3;pl<=0.3;pl+=0.3){
  var pb=new THREE.Mesh(new THREE.BoxGeometry(0.015,0.005,0.6),pbr(0x161318,{metalness:0.5,roughness:0.9}));
  pb.position.set(pl,0.351,0); g.add(pb);
}
// ハッチ
var hatch=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,0.02,10),steel(DARK));
hatch.position.set(-0.24,0.355,0.18); hatch.castShadow=true; g.add(hatch);
boltRing(g,-0.24,0.36,0.18,0.085,8,'y');
var hhandle=new THREE.Mesh(new THREE.TorusGeometry(0.035,0.008,6,10),pbr(METAL,{metalness:1,roughness:0.5}));
hhandle.rotation.x=Math.PI/2; hhandle.position.set(-0.24,0.368,0.18); hhandle.castShadow=true; g.add(hhandle);
// 旋回ベアリングリング
var ring=new THREE.Mesh(new THREE.CylinderGeometry(0.26,0.27,0.045,28),pbr(METAL,{metalness:1,roughness:0.45}));
ring.position.y=0.37; ring.castShadow=true; g.add(ring);
boltRing(g,0,0.39,0,0.235,16,'y');

// =================================================================
// 旋回部 turret（ビーム砲塔）
// =================================================================
var turret=new THREE.Group();
turret.position.y=0.40;
g.add(turret);
g.userData.turret=turret;

// --- 砲塔本体（傾斜装甲ブロック） ---
var tbody=new THREE.Mesh(roundedBox(0.5,0.2,0.5,0.05),steel(STEEL));

for(var tp=-0.15;tp<=0.15;tp+=0.15){

}
// 側面ボルト列
boltRing(turret,0,0.10,0,0,1,'z');
for(var ts=-1;ts<=1;ts+=2){

    var sbb=new THREE.Mesh(new THREE.CylinderGeometry(0.012,0.012,0.014,6),pbr(METAL,{metalness:1,roughness:0.5}));
    sbb.rotation.z=Math.PI/2; sbb.position.set(ts*0.252,0.10,bz); sbb.castShadow=true; turret.add(sbb);
  }
}

// =================================================================
var cellHousing=new THREE.Mesh(new THREE.CylinderGeometry(0.13,0.15,0.26,12),steel(DARK));
cellHousing.position.set(0,0.13,-0.22); cellHousing.castShadow=true; turret.add(cellHousing);
boltRing(turret,0,0.13,-0.22,0.13,1,'z'); // 1個基準

for(var ci=0;ci<8;ci++){

// 露出した紫コア（発光、上下リングの間に細いスリット）
var core=new THREE.Mesh(new THREE.CylinderGeometry(0.105,0.105,0.1,12),emis(ACCENT,1.6));

function insulator(px, pz, scale){
  scale = scale || 1;
  var grp = new THREE.Group();
  grp.position.set(px, 0.28, pz);
  // tapered ceramic post with stacked sheds (toroidal discs)
  var post = new THREE.Mesh(new THREE.CylinderGeometry(0.03*scale,0.05*scale,0.18*scale,10), pbr(CERAM,{metalness:0.1,roughness:0.85,grunge:true}));
  post.position.y = 0.09*scale;
  post.castShadow = true;
  grp.add(post);
  for(var s=0;s<4;s++){
    var shed = new THREE.Mesh(new THREE.CylinderGeometry(0.055*scale - s*0.004,0.06*scale - s*0.004,0.012*scale,12), pbr(CERAM,{metalness:0.1,roughness:0.85,grunge:true}));
    shed.position.y = 0.03*scale + s*0.045*scale;
    shed.castShadow = true;
    grp.add(shed);
  }
  // metal cap
  var cap = new THREE.Mesh(new THREE.CylinderGeometry(0.035*scale,0.03*scale,0.025*scale,8), pbr(0x141b1e,{metalness:0.95,roughness:0.4}));
  cap.position.y = 0.185*scale;
  cap.castShadow = true;
  grp.add(cap);
  turret.add(grp);
  return grp;
}

/* ====================== ゲーム進行 ====================== */
function buildWave(n){
  const q=[]; const count=Math.round(5+n*1.0+Math.max(0,n-6)*0.6);
  const hpMul=1+(n-1)*0.10+Math.pow(n/12,2)*0.4;
  for(let i=0;i<count;i++){
    let def=ENEMIES[0];
    const rr=Math.random();
    if(n>=3 && rr<0.22) def=ENEMIES[2];        // tank
    else if(rr<0.4) def=ENEMIES[1];            // runner
    q.push({def, hp:def.hp*hpMul, gap:0.65+Math.random()*0.3});
  }
  return q;
}
function startWave(early){
  G.wave++; G.spawnQueue=buildWave(G.wave); G.spawnTimer=0; G.waveActive=true; G.betweenT=0;
  if(early) G.parts+=18+Math.round(G.wave*1.8);
  sfx.wave();
}
function spawnOne(item){
  const def=item.def; const m=makeEnemyMesh(def); const w=cellToWorld(SPAWN_C,SPAWN_R);
  m.position.set(w.x,0,w.z); scene.add(m);
  G.enemies.push({def, mesh:m, x:w.x, z:w.z, hp:item.hp, maxhp:item.hp, speed:def.speed, slowT:0, dead:false});
}
function placeTower(c,r){
  const def=TOWER_BY_KEY[G.sel]; if(!def) return false;
  if(!cellFree(c,r)){ sfx.error(); return false; }
  if(!reachableAfter(c,r)){ sfx.error(); return false; }
  if(G.parts<def.cost){ sfx.error(); return false; }
  G.parts-=def.cost; occ[idx(c,r)]=1; G.flowDirty=true;
  const m=makeTowerMesh(def); const w=cellToWorld(c,r); m.position.set(w.x,0,w.z); scene.add(m);
  G.towers.push({def, mesh:m, c, r, x:w.x, z:w.z, cd:0, ang:Math.PI});
  sfx.place(); spawnRing(w.x,w.z,def.color);
  return true;
}
function killEnemy(e,byPlayer){
  if(e.dead) return; e.dead=true; scene.remove(e.mesh);
  if(byPlayer){ G.parts+=e.def.reward; G.score+=e.def.reward*3; G.kills++; G.combo++; G.comboT=2.0;

}
function damageBase(e){ G.hp-=e.def.dmg; e.dead=true; scene.remove(e.mesh); G.combo=0;

function updateFx(dt){
  for(let i=G.fx.length-1;i>=0;i--){ const f=G.fx[i]; f.life-=dt;
    if(f.kind==='ring'){ const k=1-f.life/f.max; f.mesh.scale.setScalar(1+k*4); f.mesh.material.opacity=0.9*(f.life/f.max); }
    if(f.life<=0){ scene.remove(f.mesh); G.fx.splice(i,1); } }
}

/* ====================== 更新 ====================== */
function update(dt){
  if(G.scene!=='playing') return;
  if(G.flowDirty){ buildFlow(); G.flowDirty=false; }
  // スポーン
  if(G.waveActive){
    if(G.spawnQueue.length>0){ G.spawnTimer-=dt; if(G.spawnTimer<=0){ const it=G.spawnQueue.shift(); spawnOne(it); G.spawnTimer=it.gap; } }
    else if(G.enemies.length===0){ G.waveActive=false; G.betweenT=5; const cb=24+Math.round(G.wave*2.4); G.parts+=cb; sfx.waveClear(); }
  } else { G.betweenT-=dt; if(G.betweenT<=0) startWave(false); }
  // 敵移動（フローフィールド）
  for(let i=G.enemies.length-1;i>=0;i--){ const e=G.enemies[i]; if(e.dead){ G.enemies.splice(i,1); continue; }
    const cell=worldToCell(e.x,e.z); let c=Math.max(0,Math.min(COLS-1,cell.c)), r=Math.max(0,Math.min(ROWS-1,cell.r));
    const ii=idx(c,r); let fc=flowC[ii], fr=flowR[ii];
    if(fc===0&&fr===0){ fc=-1; fr=0; }                 // フォールバック＝左へ
    let sp=e.speed*(e.slowT>0?0.5:1); if(e.slowT>0)e.slowT-=dt;
    const len=Math.hypot(fc,fr)||1; e.x+=(fc/len)*sp*dt*CELL; e.z+=(fr/len)*sp*dt*CELL;
    e.mesh.position.set(e.x, 0, e.z);
    const heading=Math.atan2(fr,fc); e.mesh.rotation.y=-heading+Math.PI/2;
    // HPバー更新＋ビルボード
    const hb=e.mesh.userData.hpbar; if(hb){ hb.scale.x=Math.max(0.001,e.hp/e.maxhp); hb.position.x=-(1-e.hp/e.maxhp)*0.5; hb.lookAt(camera.position); }
    // 基地到達
    if(e.x < cellToWorld(GOAL_C,BASE_R).x+0.5 && c<=GOAL_C){ damageBase(e); G.enemies.splice(i,1); }
  }
  // タワー：索敵・射撃・旋回
  for(const tw of G.towers){ const def=tw.def; tw.cd-=dt;
    let best=null,bestKey=1e9;
    for(const e of G.enemies){ if(e.dead)continue; const dx=e.x-tw.x, dz=e.z-tw.z; const d2=dx*dx+dz*dz;
      if(d2<=def.range*def.range){ const ii=idx(Math.max(0,Math.min(COLS-1,worldToCell(e.x,e.z).c)),Math.max(0,Math.min(ROWS-1,worldToCell(e.x,e.z).r))); const key=distF[ii]>=0?distF[ii]:9999;
        if(key<bestKey){bestKey=key;best=e;} } }
    if(best){ const ang=Math.atan2(best.z-tw.z, best.x-tw.x); tw.ang=ang;
      const tg=tw.mesh.userData.turret; if(tg) tg.rotation.y=-ang;
      if(tw.cd<=0){ tw.cd=def.cd; fireShot(tw,best); } }
    if(tw.mesh.userData.crystal) tw.mesh.userData.crystal.rotation.y+=dt*1.4;   // 結晶の微回転
  }
  // 弾
  for(let i=G.shots.length-1;i>=0;i--){ const s=G.shots[i];
    if(!s.target||s.target.dead){ scene.remove(s.mesh); G.shots.splice(i,1); continue; }
    const dx=s.target.x-s.x, dz=s.target.z-s.z, d=Math.hypot(dx,dz);
    const step=s.speed*dt;
    if(d<=step+0.15){ // 命中
      hitEnemy(s.target, s.dmg, s); scene.remove(s.mesh); G.shots.splice(i,1); continue; }
    s.x+=dx/d*step; s.z+=dz/d*step; s.mesh.position.set(s.x, 0.55, s.z);
  }
  // コンボ減衰
  if(G.comboT>0){ G.comboT-=dt; if(G.comboT<=0) G.combo=0; }
  // 基地リング回転
  if(baseMesh) baseMesh.userData.ring.rotation.z+=dt*1.5;
  if(spawnMesh) spawnMesh.userData.ring.rotation.z-=dt*2.0;
  updateFx(dt);
}
function fireShot(tw,target){
  const def=tw.def; const sz=def.splash>0?0.16:(def.key==='laser'?0.08:0.1);
  const m=new THREE.Mesh(new THREE.SphereGeometry(sz,8,8), new THREE.MeshBasicMaterial({color:def.color}));
  m.position.set(tw.x,0.55,tw.z); scene.add(m);
  const spd=(def.key==='sniper'||def.key==='laser')?26:(def.key==='tesla'?34:14);
  G.shots.push({mesh:m,target,x:tw.x,z:tw.z,speed:spd,dmg:def.dmg,splash:def.splash,slow:def.slow,chain:def.chain||0,color:def.color});
  sfx.fire(def.key);
}
function hitEnemy(e,dmg,s){
  if(s&&s.splash>0){ for(const o of G.enemies){ if(o.dead)continue; const dx=o.x-e.x,dz=o.z-e.z; if(dx*dx+dz*dz<=s.splash*s.splash){ o.hp-=dmg*(o===e?1:0.6); if(s.slow>0)o.slowT=1.2; if(o.hp<=0)killEnemy(o,true);} } spawnRing(e.x,e.z,0xffb22e); }
  else { e.hp-=dmg; if(s&&s.slow>0)e.slowT=1.2; if(e.hp<=0)killEnemy(e,true); }
  if(s&&s.chain){ let hops=s.chain, from=e; const used=new Set([e]); const R2=2.6*2.6;
    while(hops-->0){ let best=null,bd=R2; for(const o of G.enemies){ if(o.dead||used.has(o))continue; const dx=o.x-from.x,dz=o.z-from.z,dd=dx*dx+dz*dz; if(dd<bd){bd=dd;best=o;} }
      if(!best)break; used.add(best); spawnRing(best.x,best.z,s.color||0x18d0ff); best.hp-=dmg*0.6; if(best.hp<=0)killEnemy(best,true); from=best; } }
}

let ptrDown=false, dragged=false, panMode=false, lastX=0,lastY=0, downX=0,downY=0, pinchD=0, pinchMX=0, pinchMY=0;
function pointerNDC(x,y){ ndc.set((x/window.innerWidth)*2-1, -(y/window.innerHeight)*2+1); }
function raycastCell(x,y){
  pointerNDC(x,y); raycaster.setFromCamera(ndc,camera);
  const hit=raycaster.intersectObject(groundMesh); if(!hit.length) return null;
  const p=hit[0].point; const cell=worldToCell(p.x,p.z); return inGrid(cell.c,cell.r)?cell:null;

// カメラ注視点を地面に沿って平行移動（横移動）
function panCamera(dx,dy){
  const f=new THREE.Vector3(); camera.getWorldDirection(f); f.y=0; if(f.lengthSq()<1e-6)return; f.normalize();
  const r=new THREE.Vector3(f.z,0,-f.x);   // 地面上の右方向
  const k=camR*0.0018;
  camTarget.x += -dx*k*r.x - dy*k*f.x;
  camTarget.z += -dx*k*r.z - dy*k*f.z;
  camTarget.x=Math.max(-WW*0.75,Math.min(WW*0.75,camTarget.x));
  camTarget.z=Math.max(-WD*0.75,Math.min(WD*0.75,camTarget.z));
  updateCamera();
}

  panMode=(e.button===2||e.button===1||e.shiftKey); lastX=downX=e.clientX; lastY=downY=e.clientY; });

  else { camTheta-=dx*0.006; camPhi=Math.max(0.30,Math.min(1.30,camPhi-dy*0.005)); updateCamera(); } });

  pinchMX=(e.touches[0].clientX+e.touches[1].clientX)/2; pinchMY=(e.touches[0].clientY+e.touches[1].clientY)/2; } },{passive:true});

  const mx=(e.touches[0].clientX+e.touches[1].clientX)/2, my=(e.touches[0].clientY+e.touches[1].clientY)/2;
  if(pinchD){ camR=Math.max(10,Math.min(44,camR*(pinchD/d))); }
  panCamera(mx-pinchMX, my-pinchMY);   // 2本指パン（要望で元方向に戻す）
  pinchD=d; pinchMX=mx; pinchMY=my; updateCamera(); } },{passive:true});

  ov.querySelector('h1').textContent='W'+G.wave+'  ★'+G.score.toLocaleString();
  ov.querySelector('.vs').innerHTML='<span class="mid">☠ '+G.kills+' destroyed</span>';
  ov.querySelector('.play').textContent='▶';
}

/* ====================== Audio（レイヤー合成・リアル志向／単音ビープ廃止） ====================== */
let AC=null, master=null, comp=null, _nb=null;
function initAudio(){ if(AC)return; try{
  AC=new (window.AudioContext||window.webkitAudioContext)();
  comp=AC.createDynamicsCompressor(); comp.threshold.value=-16; comp.knee.value=22; comp.ratio.value=4; comp.attack.value=0.003; comp.release.value=0.18;
  master=AC.createGain(); master.gain.value=0.6; master.connect(comp); comp.connect(AC.destination);
}catch(e){ AC=null; } }   // API欠如/失敗時は無音（クラッシュ回避）
function _now(){ return AC.currentTime; }
// オシレータ（周波数スイープ＋エンベロープ）
function tone(f0,f1,t0,dur,type,vol,dest){ if(!AC)return; const o=AC.createOscillator(),g=AC.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(f0,t0); if(f1&&f1!==f0) o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t0+dur);
  g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(vol,t0+Math.min(0.012,dur*0.25)); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g); g.connect(dest||master); o.start(t0); o.stop(t0+dur+0.03); }
function noiseBuf(){ if(_nb)return _nb; const len=(AC.sampleRate*1.0)|0; _nb=AC.createBuffer(1,len,AC.sampleRate); const d=_nb.getChannelData(0); for(let i=0;i<len;i++) d[i]=Math.random()*2-1; return _nb; }
// ノイズ→バイカッド→エンベロープ（射撃/爆発/風の素）
function noise(t0,dur,vol,filt,freq,q,dest){ if(!AC)return; const s=AC.createBufferSource(); s.buffer=noiseBuf(); s.loop=true;
  const bp=AC.createBiquadFilter(); bp.type=filt||'lowpass'; bp.frequency.value=freq||1000; if(q)bp.Q.value=q;
  const g=AC.createGain(); g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(vol,t0+0.005); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  s.connect(bp); bp.connect(g); g.connect(dest||master); s.start(t0); s.stop(t0+dur+0.03); }
const sfx={
  fire(key){ if(!AC)return; const t=_now();
    if(key==='cannon'){ tone(120,40,t,0.55,'sine',0.5); noise(t,0.5,0.5,'lowpass',600,1); tone(70,30,t,0.6,'triangle',0.4); noise(t,0.05,0.45,'highpass',2200,1); }
    else if(key==='sniper'){ noise(t,0.04,0.55,'highpass',2600,1); tone(950,200,t,0.18,'sawtooth',0.22); tone(140,55,t,0.28,'sine',0.3); }
    else if(key==='mortar'){ tone(170,55,t,0.4,'sine',0.42); noise(t,0.32,0.4,'lowpass',520,1); tone(320,120,t,0.1,'square',0.14); }
    else if(key==='laser'){ tone(1500,520,t,0.22,'sawtooth',0.17); tone(2700,950,t,0.18,'sine',0.1); noise(t,0.18,0.14,'bandpass',1900,4); }
    else if(key==='tesla'){ for(let i=0;i<5;i++){ const tt=t+i*0.028; noise(tt,0.045,0.3,'bandpass',2400+Math.random()*2400,7); } tone(80,180,t,0.2,'square',0.1); }
    else if(key==='frost'){ noise(t,0.22,0.22,'highpass',3200,1); tone(700,1600,t,0.22,'sine',0.12); }
    else { noise(t,0.05,0.36,'highpass',1500,0.8); tone(520,170,t,0.05,'square',0.12); tone(150,70,t,0.08,'sine',0.18); }
  },
  place(){ if(!AC)return; const t=_now(); noise(t,0.12,0.3,'lowpass',900,1); tone(120,65,t,0.18,'sine',0.3); noise(t+0.05,0.05,0.2,'highpass',3000,1); },
  kill(combo){ if(!AC)return; const t=_now(); noise(t,0.36,0.5,'lowpass',1200,0.8); tone(90,38,t,0.5,'sine',0.4); noise(t,0.06,0.42,'highpass',2600,1); tone(300+Math.min(500,(combo||0)*20),900,t,0.08,'triangle',0.12); },
  baseHit(){ if(!AC)return; const t=_now(); tone(90,32,t,0.55,'sine',0.5); noise(t,0.42,0.45,'lowpass',420,1); tone(50,26,t,0.65,'triangle',0.4); },
  wave(){ if(!AC)return; const t=_now(); tone(330,330,t,0.12,'square',0.12); tone(415,415,t+0.12,0.12,'square',0.12); tone(554,554,t+0.24,0.2,'square',0.13); noise(t,0.5,0.06,'bandpass',500,1); },
  waveClear(){ if(!AC)return; const t=_now(); tone(523,523,t,0.12,'sine',0.16); tone(659,659,t+0.1,0.12,'sine',0.16); tone(784,784,t+0.2,0.24,'sine',0.18); },
  ui(){ if(!AC)return; const t=_now(); tone(680,540,t,0.05,'sine',0.09); },
  error(){ if(!AC)return; const t=_now(); tone(180,115,t,0.13,'sawtooth',0.15); noise(t,0.08,0.1,'lowpass',800,1); },
};
function beep(){}   // 旧API無効化（単音ビープ廃止）

/* ====================== ループ ====================== */
let last=0, acc=0; const STEP=1/60;
function loop(now){
  const t=now/1000; let frame=last?t-last:0; last=t; if(frame>0.25)frame=0.25;
  if(!G.paused && G.scene==='playing'){ acc+=frame*G.speed; if(acc>STEP*5)acc=STEP*5; while(acc>=STEP){ update(STEP); acc-=STEP; } }
  syncHUD();
  if(composer) composer.render(); else if(renderer) renderer.render(scene,camera);
  requestAnimationFrame(loop);
}

// 起動
if(THREEOK){ initScene(); buildWeaponBar(); requestAnimationFrame(loop); }
else { document.getElementById('ov').innerHTML='<div style="color:#ff3b54;font:700 18px sans-serif">3Dエンジンの読み込みに失敗しました（ネット接続を確認してください）</div>'; }
</script>
