<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>HUMANITY DEFENSE 205X — 3D MVP</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=Rajdhani:wght@600;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
  html,body{width:100%;height:100%;background:#05070c;overflow:hidden;position:fixed;
    font-family:"Rajdhani","Chakra Petch",system-ui,sans-serif;color:#e8f4ff;touch-action:none;}
  #cv{position:fixed;inset:0;display:block;}
  #hud{position:fixed;inset:0;pointer-events:none;
    padding:max(6px,env(safe-area-inset-top)) max(8px,env(safe-area-inset-right)) max(8px,env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-left));}
  /* 上HUD */
  #top{position:absolute;left:10px;right:10px;top:max(8px,env(safe-area-inset-top));display:flex;align-items:center;gap:18px;height:40px;}
  .stat{display:flex;flex-direction:column;line-height:1;}
  .stat .lab{font:600 9px "Rajdhani";color:rgba(180,205,230,.55);letter-spacing:1px;}
  .stat .val{font:700 19px "JetBrains Mono";}
  #hpwrap{width:150px;height:22px;border-radius:5px;background:rgba(255,255,255,.06);
    border:1px solid rgba(120,160,200,.3);position:relative;overflow:hidden;}
  #hpfill{position:absolute;left:0;top:0;bottom:0;background:#2fd06a;width:100%;}
  #hptxt{position:absolute;inset:0;display:flex;align-items:center;padding-left:8px;font:700 13px "JetBrains Mono";
    text-shadow:0 0 3px #000,0 1px 2px #000;}
  .spacer{flex:1;}
  .ico{pointer-events:auto;width:40px;height:40px;display:flex;align-items:center;justify-content:center;
    font:700 18px "Rajdhani";color:#aecadf;cursor:pointer;}
  .ico.on{color:#33e0ff;text-shadow:0 0 8px #33e0ff;}
  /* 下：兵器ピッカー */
  #bottom{position:absolute;left:0;right:0;bottom:max(10px,env(safe-area-inset-bottom));display:flex;justify-content:center;gap:14px;}
  .wbtn{pointer-events:auto;min-width:96px;padding:8px 14px 9px;cursor:pointer;position:relative;text-align:center;
    background:linear-gradient(180deg,rgba(46,66,90,.42),rgba(10,16,26,.5));border-radius:12px;}
  .wbtn .wn{font:700 14px "Rajdhani";letter-spacing:1px;color:#eef7ff;}
  .wbtn .wc{font:700 13px "JetBrains Mono";color:#ffb22e;margin-top:2px;}
  .wbtn::after{content:"";position:absolute;left:14px;right:14px;bottom:5px;height:2px;background:var(--sc,#33e0ff);
    box-shadow:0 0 8px var(--sc,#33e0ff);opacity:.5;}
  .wbtn.sel{background:linear-gradient(180deg,rgba(60,90,120,.6),rgba(14,22,34,.6));}
  .wbtn.sel::after{opacity:1;height:3px;}
  /* オーバーレイ（タイトル/ゲームオーバー） */
  #ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    pointer-events:auto;background:radial-gradient(ellipse at center,rgba(5,8,14,.55),rgba(3,5,9,.92));text-align:center;}
  #ov h1{font:700 38px "Chakra Petch";letter-spacing:2px;
    background:linear-gradient(180deg,#eaf4ff,#5aa0d8);-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 18px rgba(51,224,255,.35);}
  #ov .yr{font:700 14px "JetBrains Mono";letter-spacing:6px;color:rgba(127,208,255,.7);}
  #ov .vs{font:700 14px "Chakra Petch";} #ov .hdf{color:#33e0ff;} #ov .zero{color:#ff3b54;}
  #ov .mid{color:#7a8694;font:600 12px "Rajdhani";}
  #ov .play{margin-top:14px;width:74px;height:74px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle,rgba(40,60,82,.55),rgba(10,16,26,.25));border:1px solid rgba(70,240,138,.6);
    color:#46f08a;font-size:30px;cursor:pointer;text-shadow:0 0 14px #46f08a;}
  #ov .hint{font:600 11px "Rajdhani";color:rgba(180,205,230,.55);margin-top:6px;}
  #ov.hidden{display:none;}
  #badge{position:absolute;right:10px;bottom:64px;font:600 10px "Rajdhani";color:rgba(180,205,230,.4);}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="hud">
  <div id="top">
    <div id="hpwrap"><div id="hpfill"></div><div id="hptxt">100/100</div></div>
    <div class="stat"><span class="lab">⚙ PARTS</span><span class="val" id="parts" style="color:#ffb22e">200</span></div>
    <div class="stat"><span class="lab">WAVE</span><span class="val" id="wave">0</span></div>
    <div class="stat"><span class="lab">SCORE</span><span class="val" id="score" style="color:#33e0ff">0</span></div>
    <div class="spacer"></div>
    <div class="ico" id="bNext" title="next">▶▶</div>
    <div class="ico" id="bSpeed">x1</div>
    <div class="ico" id="bPause">❚❚</div>
  </div>
  <div id="bottom"></div>
  <div id="badge">3D MVP · phase ①②</div>
</div>
<div id="ov">
  <div class="yr">205X</div>
  <h1>HUMANITY DEFENSE</h1>
  <div class="vs"><span class="hdf">人類防衛軍 HDF</span> <span class="mid">VS</span> <span class="zero">暴走AI「ZERO」軍団</span></div>
  <div class="play" id="bStart">▶</div>
  <div class="hint">TAP TO DEPLOY ·  ドラッグで視点 / ピンチでズーム / タップで設置</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- 写実化用：IBL環境＋ポストプロセス(ブルーム)。r128のUMDモジュール -->
<script src="https://unpkg.com/three@0.128.0/examples/js/environments/RoomEnvironment.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script>
"use strict";
/* ============================================================================
   HUMANITY DEFENSE 205X — 3D MVP（Three.js）
   フェーズ①3D基盤＋②ロジック移植：フローフィールド迷路TDを3D化
   人類防衛軍 HDF（味方タワー） vs 暴走AI ZERO（敵・右→左へ侵攻）
   ※2D版(index.html)はそのまま。これは方向性/性能確認用のMVP。
   ============================================================================ */
const THREEOK = (typeof THREE!=='undefined');

// ---- 盤面定数 ----
const COLS=16, ROWS=9, CELL=1.4;
const WW=COLS*CELL, WD=ROWS*CELL;
const GOAL_C=0, BASE_R=Math.floor(ROWS/2);
const SPAWN_C=COLS-1, SPAWN_R=Math.floor(ROWS/2);
const idx=(c,r)=>r*COLS+c;
function cellToWorld(c,r){ return {x:(c+0.5)*CELL-WW/2, z:(r+0.5)*CELL-WD/2}; }
function worldToCell(x,z){ return {c:Math.floor((x+WW/2)/CELL), r:Math.floor((z+WD/2)/CELL)}; }
const inGrid=(c,r)=>c>=0&&r>=0&&c<COLS&&r<ROWS;

// ---- 状態 ----
const occ=new Uint8Array(COLS*ROWS);          // 1=タワー(壁)
const distF=new Int32Array(COLS*ROWS);
const flowC=new Float32Array(COLS*ROWS), flowR=new Float32Array(COLS*ROWS);
const G={ scene:'title', parts:200, hp:100, hpMax:100, wave:0, score:0, kills:0, combo:0, comboT:0,
  speed:1, paused:false, sel:'gun', towers:[], enemies:[], shots:[], fx:[],
  spawnQueue:[], spawnTimer:0, waveActive:false, betweenT:3, flowDirty:true };

// ---- 兵器定義（MVP 3種）----
const TOWERS=[
  {key:'gun',   name:'GUN',    cost:60,  range:3.6, dmg:8,  cd:0.30, color:0x33e0ff, splash:0,   slow:0},
  {key:'cannon',name:'CANNON', cost:110, range:3.4, dmg:34, cd:1.10, color:0xffb22e, splash:1.6, slow:0},
  {key:'frost', name:'FROST',  cost:90,  range:3.2, dmg:5,  cd:0.65, color:0x8fd8ff, splash:0,   slow:0.5},
];
const TOWER_BY_KEY={}; TOWERS.forEach(t=>TOWER_BY_KEY[t.key]=t);

// ---- 敵アーキタイプ（MVP）----
const ENEMIES=[
  {key:'grunt', hp:34,  speed:1.9, reward:7,  scale:0.62, color:0xff5a6e, dmg:5},
  {key:'runner',hp:22,  speed:3.0, reward:8,  scale:0.5,  color:0xff8a3a, dmg:4},
  {key:'tank',  hp:120, speed:1.1, reward:16, scale:0.9,  color:0xb03050, dmg:9},
];

/* ====================== フローフィールド ====================== */
const _q=new Int32Array(COLS*ROWS);
function buildFlow(){
  distF.fill(-1); let head=0,tail=0;
  for(let r=0;r<ROWS;r++){ const i=idx(GOAL_C,r); if(!occ[i]){ distF[i]=0; _q[tail++]=i; } }
  while(head<tail){ const i=_q[head++]; const c=i%COLS, r=(i/COLS)|0, d=distF[i]+1;
    if(c+1<COLS){const j=i+1;   if(!occ[j]&&distF[j]<0){distF[j]=d;_q[tail++]=j;}}
    if(c-1>=0){ const j=i-1;    if(!occ[j]&&distF[j]<0){distF[j]=d;_q[tail++]=j;}}
    if(r+1<ROWS){const j=i+COLS;if(!occ[j]&&distF[j]<0){distF[j]=d;_q[tail++]=j;}}
    if(r-1>=0){ const j=i-COLS; if(!occ[j]&&distF[j]<0){distF[j]=d;_q[tail++]=j;}}
  }
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){ const i=idx(c,r); flowC[i]=0; flowR[i]=0;
    if(distF[i]<0) continue; let best=distF[i],bc=0,br=0;
    if(c+1<COLS&&distF[i+1]>=0&&distF[i+1]<best){best=distF[i+1];bc=1;br=0;}
    if(c-1>=0 &&distF[i-1]>=0&&distF[i-1]<best){best=distF[i-1];bc=-1;br=0;}
    if(r+1<ROWS&&distF[i+COLS]>=0&&distF[i+COLS]<best){best=distF[i+COLS];bc=0;br=1;}
    if(r-1>=0 &&distF[i-COLS]>=0&&distF[i-COLS]<best){best=distF[i-COLS];bc=0;br=-1;}
    flowC[i]=bc; flowR[i]=br;
  }
}
const _seen=new Uint8Array(COLS*ROWS);
function reachableAfter(c,r){ // そのマスに壁を置いても spawn→base が繋がるか
  const i0=idx(c,r); const was=occ[i0]; occ[i0]=1;
  _seen.fill(0); let head=0,tail=0,ok=false;
  for(let rr=0;rr<ROWS;rr++){ const i=idx(GOAL_C,rr); if(!occ[i]){_seen[i]=1;_q[tail++]=i;} }
  while(head<tail){ const i=_q[head++]; const cc=i%COLS, rr=(i/COLS)|0;
    if(cc===SPAWN_C&&rr===SPAWN_R){ok=true;break;}
    const nb=[i+1,i-1,i+COLS,i-COLS], cs=[cc+1,cc-1,cc,cc], rs=[rr,rr,rr+1,rr-1];
    for(let k=0;k<4;k++){ if(cs[k]<0||cs[k]>=COLS||rs[k]<0||rs[k]>=ROWS)continue; const j=nb[k];
      if(!occ[j]&&!_seen[j]){_seen[j]=1;_q[tail++]=j;} } }
  occ[i0]=was; return ok;
}
function cellFree(c,r){ if(!inGrid(c,r))return false;
  if(c===GOAL_C&&r===BASE_R)return false; if(c===SPAWN_C&&r===SPAWN_R)return false;
  return !occ[idx(c,r)]; }

/* ====================== Three.js シーン ====================== */
let renderer,scene,camera,raycaster,groundMesh,baseMesh,spawnMesh,composer,bloomPass,envTex;
let camR=24, camTheta=0.0, camPhi=0.92; const camTarget={x:0,y:0.6,z:0};
const tmpV=THREEOK?new THREE.Vector3():null, ndc=THREEOK?new THREE.Vector2():null;

function gridTexture(){
  const cv=document.createElement('canvas'); cv.width=COLS*32; cv.height=ROWS*32; const g=cv.getContext('2d');
  g.fillStyle='#0c1622'; g.fillRect(0,0,cv.width,cv.height);
  for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++){ if((c+r)%2===0){ g.fillStyle='rgba(255,255,255,0.018)'; g.fillRect(c*32,r*32,32,32); } }
  g.strokeStyle='rgba(90,140,190,0.22)'; g.lineWidth=1;
  for(let c=0;c<=COLS;c++){ g.beginPath(); g.moveTo(c*32,0); g.lineTo(c*32,cv.height); g.stroke(); }
  for(let r=0;r<=ROWS;r++){ g.beginPath(); g.moveTo(0,r*32); g.lineTo(cv.width,r*32); g.stroke(); }
  const tx=new THREE.CanvasTexture(cv); tx.anisotropy=4; return tx;
}
function initScene(){
  const cv=document.getElementById('cv');
  renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true});
  renderer.setPixelRatio(Math.min(2,window.devicePixelRatio||1));
  renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.outputEncoding=THREE.sRGBEncoding;                 // 正しい色空間
  renderer.toneMapping=THREE.ACESFilmicToneMapping;           // 映画的トーンマップ
  renderer.toneMappingExposure=1.05;
  scene=new THREE.Scene(); scene.background=new THREE.Color(0x05070c); scene.fog=new THREE.Fog(0x070b14, 30, 70);
  camera=new THREE.PerspectiveCamera(46, 1, 0.1, 200);
  raycaster=new THREE.Raycaster();
  // IBL環境マップ（金属の反射＝写実感の要）
  try{ const pmrem=new THREE.PMREMGenerator(renderer); envTex=pmrem.fromScene(new THREE.RoomEnvironment(renderer),0.04).texture; scene.environment=envTex; }catch(e){}
  // ライト（キー＋フィル＋リム、ソフトシャドウ）
  scene.add(new THREE.AmbientLight(0x223044, 0.35));
  scene.add(new THREE.HemisphereLight(0x86a8d0, 0x0a0e16, 0.45));
  const key=new THREE.DirectionalLight(0xdfeeff, 2.0); key.position.set(-10,18,12); key.castShadow=true;
  key.shadow.mapSize.set(2048,2048); key.shadow.radius=5; key.shadow.bias=-0.0004;
  key.shadow.camera.left=-WW; key.shadow.camera.right=WW; key.shadow.camera.top=WD; key.shadow.camera.bottom=-WD; key.shadow.camera.near=1; key.shadow.camera.far=70;
  scene.add(key);
  const rim=new THREE.DirectionalLight(0x4aa0ff, 0.8); rim.position.set(12,8,-14); scene.add(rim);
  const fill=new THREE.PointLight(0xff5a6e, 0.6, 30); fill.position.set(WW/2,6,0); scene.add(fill);   // スポーン側の赤フィル
  // 地面（PBR・微反射）
  const gt=gridTexture(); gt.encoding=THREE.sRGBEncoding;
  groundMesh=new THREE.Mesh(new THREE.PlaneGeometry(WW,WD,1,1), new THREE.MeshStandardMaterial({map:gt,roughness:0.72,metalness:0.25,envMapIntensity:0.5}));
  groundMesh.rotation.x=-Math.PI/2; groundMesh.receiveShadow=true; scene.add(groundMesh);
  // 基地（HDF・シアン）
  baseMesh=new THREE.Group(); const bw=cellToWorld(GOAL_C,BASE_R);
  const core=new THREE.Mesh(roundedBox(1.0,1.5,1.0,0.22), pbr(0x16323f,{metalness:0.85,roughness:0.32,emissive:0x0a3a4a,ei:0.5,clearcoat:0.6}));
  core.position.y=0.8; core.castShadow=true; baseMesh.add(core);
  const dome=new THREE.Mesh(new THREE.SphereGeometry(0.5,24,16,0,Math.PI*2,0,Math.PI/2), pbr(0x1d4a5c,{metalness:0.9,roughness:0.25,emissive:0x33e0ff,ei:0.25,clearcoat:0.8})); dome.position.y=1.55; dome.castShadow=true; baseMesh.add(dome);
  const ring=new THREE.Mesh(new THREE.TorusGeometry(0.9,0.06,12,40), emis(0x33e0ff,1.4)); ring.position.y=0.95; ring.rotation.x=Math.PI/2; baseMesh.add(ring); baseMesh.userData.ring=ring;
  baseMesh.position.set(bw.x,0,bw.z); scene.add(baseMesh);
  // スポーン（ZERO・レッド）
  spawnMesh=new THREE.Group(); const sw=cellToWorld(SPAWN_C,SPAWN_R);
  const sr=new THREE.Mesh(new THREE.TorusGeometry(0.72,0.06,12,40), emis(0xff3b54,1.6)); sr.rotation.x=Math.PI/2; sr.position.y=0.45; spawnMesh.add(sr); spawnMesh.userData.ring=sr;
  const sr2=new THREE.Mesh(new THREE.TorusGeometry(0.45,0.04,10,32), emis(0xff7a8a,1.2)); sr2.rotation.x=Math.PI/2; sr2.position.y=0.45; spawnMesh.add(sr2);
  spawnMesh.position.set(sw.x,0,sw.z); scene.add(spawnMesh);
  // ポストプロセス（ブルーム＝発光の写実）
  try{
    composer=new THREE.EffectComposer(renderer);
    composer.addPass(new THREE.RenderPass(scene,camera));
    bloomPass=new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth,window.innerHeight), 0.55, 0.5, 0.82);
    composer.addPass(bloomPass);
  }catch(e){ composer=null; }
  buildFlow(); updateCamera(); resize();
}
function updateCamera(){
  const x=camTarget.x+camR*Math.sin(camPhi)*Math.sin(camTheta);
  const y=camTarget.y+camR*Math.cos(camPhi);
  const z=camTarget.z+camR*Math.sin(camPhi)*Math.cos(camTheta);
  camera.position.set(x,y,z); camera.lookAt(camTarget.x,camTarget.y,camTarget.z);
}
function resize(){ const w=window.innerWidth,h=window.innerHeight;
  renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix();
  if(composer){ composer.setSize(w,h); if(bloomPass&&bloomPass.setSize) bloomPass.setSize(w,h); } }
window.addEventListener('resize',()=>{ if(renderer)resize(); });

/* ====================== マテリアル/形状ヘルパー（写実化） ====================== */
function pbr(color,o){ o=o||{}; return new THREE.MeshPhysicalMaterial({ color:color,
  metalness:(o.metalness==null?0.85:o.metalness), roughness:(o.roughness==null?0.4:o.roughness),
  emissive:(o.emissive||0x000000), emissiveIntensity:(o.ei||0),
  clearcoat:(o.clearcoat||0), clearcoatRoughness:(o.ccr==null?0.4:o.ccr), envMapIntensity:(o.envI==null?1.0:o.envI) }); }
function emis(color,intensity){ return new THREE.MeshStandardMaterial({ color:0x05070a, emissive:color, emissiveIntensity:(intensity||1.0), metalness:0.2, roughness:0.5 }); }
const MAT=(c,e,ei)=>pbr(c,{emissive:e,ei:ei});
// 角丸ボックス（ExtrudeGeometryのベベルで全エッジを丸める＝箱っぽさ脱却）
function roundedRectShape(w,h,r){ const s=new THREE.Shape(); const x=-w/2,y=-h/2;
  s.moveTo(x+r,y); s.lineTo(x+w-r,y); s.quadraticCurveTo(x+w,y,x+w,y+r);
  s.lineTo(x+w,y+h-r); s.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  s.lineTo(x+r,y+h); s.quadraticCurveTo(x,y+h,x,y+h-r);
  s.lineTo(x,y+r); s.quadraticCurveTo(x,y,x+r,y); return s; }
function roundedBox(w,h,d,r){ r=Math.max(0.02,Math.min(r,Math.min(w,h)/2-0.02)); const bt=Math.max(0.02,Math.min(r,d/2-0.02));
  const geo=new THREE.ExtrudeGeometry(roundedRectShape(w,h,r),{depth:Math.max(0.02,d-2*bt),bevelEnabled:true,bevelThickness:bt,bevelSize:bt,bevelSegments:3,steps:1,curveSegments:6});
  geo.translate(0,0,-(d-2*bt)/2-bt); geo.computeVertexNormals(); return geo; }

/* ====================== タワー/敵 メッシュ（丸み＋陰影＋反射） ====================== */
function makeTowerMesh(def){
  const g=new THREE.Group();
  // 台座（面取りの円盤＋脚）
  const plinth=new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.58,0.16,24), pbr(0x1b222c,{metalness:0.7,roughness:0.5,clearcoat:0.2})); plinth.position.y=0.08; plinth.castShadow=true; plinth.receiveShadow=true; g.add(plinth);
  const collar=new THREE.Mesh(new THREE.CylinderGeometry(0.36,0.42,0.2,24), pbr(0x2a3340,{metalness:0.85,roughness:0.35,clearcoat:0.4})); collar.position.y=0.24; collar.castShadow=true; g.add(collar);
  const turret=new THREE.Group(); turret.position.y=0.42; g.add(turret); g.userData.turret=turret;
  // 砲塔ボディ（角丸）
  const bodyMesh=new THREE.Mesh(roundedBox(0.56,0.32,0.5,0.12), pbr(def.color,{metalness:0.9,roughness:0.3,clearcoat:0.6,ccr:0.3,emissive:def.color,ei:0.06})); bodyMesh.castShadow=true; turret.add(bodyMesh);
  // ドーム（上面の丸み）
  const dome=new THREE.Mesh(new THREE.SphereGeometry(0.22,20,14,0,Math.PI*2,0,Math.PI/2), pbr(0x39424f,{metalness:0.9,roughness:0.25,clearcoat:0.7})); dome.position.set(-0.05,0.16,0); dome.castShadow=true; turret.add(dome);
  // 砲身（滑らか・先端リング）
  const barrel=new THREE.Mesh(new THREE.CylinderGeometry(0.075,0.085,0.7,20), pbr(0x9aa6b4,{metalness:0.95,roughness:0.22,clearcoat:0.5})); barrel.rotation.z=Math.PI/2; barrel.position.set(0.46,0.02,0); barrel.castShadow=true; turret.add(barrel);
  const muzzle=new THREE.Mesh(new THREE.TorusGeometry(0.1,0.03,10,18), pbr(0x4a5360,{metalness:0.9,roughness:0.3})); muzzle.rotation.y=Math.PI/2; muzzle.position.set(0.82,0.02,0); turret.add(muzzle);
  // 発光レンズ（ブルームで光る）
  const lens=new THREE.Mesh(new THREE.SphereGeometry(0.09,16,16), emis(def.color,1.8)); lens.position.set(0.04,0.2,0); turret.add(lens);
  return g;
}
function makeEnemyMesh(def){
  const g=new THREE.Group();
  // 胴（角丸・前傾）
  const body=new THREE.Mesh(roundedBox(0.66,0.5,0.92,0.16), pbr(def.color,{metalness:0.55,roughness:0.5,clearcoat:0.3,emissive:def.color,ei:0.06})); body.position.y=0.42; body.rotation.x=-0.08; body.castShadow=true; g.add(body); g.userData.body=body;
  // 頭（多面体＝メカ感）＋単眼の発光
  const head=new THREE.Mesh(new THREE.IcosahedronGeometry(0.26,0), pbr(0x2a2030,{metalness:0.7,roughness:0.4})); head.position.set(-0.34,0.56,0); head.castShadow=true; g.add(head);
  const eye=new THREE.Mesh(new THREE.SphereGeometry(0.1,16,16), emis(0xff2a2a,2.2)); eye.position.set(-0.5,0.56,0); g.add(eye);
  // 肩の球関節
  for(const s of [-1,1]){ const j=new THREE.Mesh(new THREE.SphereGeometry(0.13,16,12), pbr(0x33323a,{metalness:0.8,roughness:0.35})); j.position.set(0.05,0.5,s*0.34); j.castShadow=true; g.add(j); }
  // 脚（円柱）
  for(const s of [-1,1]){ const leg=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.06,0.42,12), pbr(0x26252c,{metalness:0.6,roughness:0.5})); leg.position.set(0.12,0.2,s*0.22); leg.castShadow=true; g.add(leg); }
  g.scale.setScalar(def.scale*1.35);
  // HPバー（ビルボード）
  const hp=new THREE.Mesh(new THREE.PlaneGeometry(1.0,0.11), new THREE.MeshBasicMaterial({color:0x46f08a})); hp.position.y=1.0; g.add(hp); g.userData.hpbar=hp;
  const hpbg=new THREE.Mesh(new THREE.PlaneGeometry(1.05,0.15), new THREE.MeshBasicMaterial({color:0x0a0f16})); hpbg.position.y=1.0; hpbg.position.z=-0.01; g.add(hpbg);
  return g;
}

/* ====================== ゲーム進行 ====================== */
function buildWave(n){
  const q=[]; const count=Math.round(5+n*1.0+Math.max(0,n-6)*0.6);
  const hpMul=1+(n-1)*0.10+Math.pow(n/12,2)*0.4;
  for(let i=0;i<count;i++){
    let def=ENEMIES[0];
    const rr=Math.random();
    if(n>=3 && rr<0.22) def=ENEMIES[2];        // tank
    else if(rr<0.4) def=ENEMIES[1];            // runner
    q.push({def, hp:def.hp*hpMul, gap:0.65+Math.random()*0.3});
  }
  return q;
}
function startWave(early){
  G.wave++; G.spawnQueue=buildWave(G.wave); G.spawnTimer=0; G.waveActive=true; G.betweenT=0;
  if(early) G.parts+=18+Math.round(G.wave*1.8);
  beep(420,0.06,'square',0.12);
}
function spawnOne(item){
  const def=item.def; const m=makeEnemyMesh(def); const w=cellToWorld(SPAWN_C,SPAWN_R);
  m.position.set(w.x,0,w.z); scene.add(m);
  G.enemies.push({def, mesh:m, x:w.x, z:w.z, hp:item.hp, maxhp:item.hp, speed:def.speed, slowT:0, dead:false});
}
function placeTower(c,r){
  const def=TOWER_BY_KEY[G.sel]; if(!def) return false;
  if(!cellFree(c,r)){ beep(160,0.05,'sawtooth',0.1); return false; }
  if(!reachableAfter(c,r)){ beep(140,0.08,'sawtooth',0.12); return false; }
  if(G.parts<def.cost){ beep(160,0.05,'sawtooth',0.1); return false; }
  G.parts-=def.cost; occ[idx(c,r)]=1; G.flowDirty=true;
  const m=makeTowerMesh(def); const w=cellToWorld(c,r); m.position.set(w.x,0,w.z); scene.add(m);
  G.towers.push({def, mesh:m, c, r, x:w.x, z:w.z, cd:0, ang:Math.PI});
  beep(640,0.07,'square',0.14); spawnRing(w.x,w.z,def.color);
  return true;
}
function killEnemy(e,byPlayer){
  if(e.dead) return; e.dead=true; scene.remove(e.mesh);
  if(byPlayer){ G.parts+=e.def.reward; G.score+=e.def.reward*3; G.kills++; G.combo++; G.comboT=2.0;
    spawnRing(e.x,e.z,0x46f08a); beep(300+Math.min(600,G.combo*20),0.05,'triangle',0.10); }
}
function damageBase(e){ G.hp-=e.def.dmg; e.dead=true; scene.remove(e.mesh); G.combo=0;
  beep(120,0.12,'sawtooth',0.16);
  if(G.hp<=0){ G.hp=0; gameOver(); } }

/* ====================== エフェクト ====================== */
function spawnRing(x,z,color){
  const m=new THREE.Mesh(new THREE.RingGeometry(0.2,0.32,20), new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.9,side:THREE.DoubleSide}));
  m.rotation.x=-Math.PI/2; m.position.set(x,0.05,z); scene.add(m); G.fx.push({mesh:m,life:0.5,max:0.5,kind:'ring'});
}
function updateFx(dt){
  for(let i=G.fx.length-1;i>=0;i--){ const f=G.fx[i]; f.life-=dt;
    if(f.kind==='ring'){ const k=1-f.life/f.max; f.mesh.scale.setScalar(1+k*4); f.mesh.material.opacity=0.9*(f.life/f.max); }
    if(f.life<=0){ scene.remove(f.mesh); G.fx.splice(i,1); } }
}

/* ====================== 更新 ====================== */
function update(dt){
  if(G.scene!=='playing') return;
  if(G.flowDirty){ buildFlow(); G.flowDirty=false; }
  // スポーン
  if(G.waveActive){
    if(G.spawnQueue.length>0){ G.spawnTimer-=dt; if(G.spawnTimer<=0){ const it=G.spawnQueue.shift(); spawnOne(it); G.spawnTimer=it.gap; } }
    else if(G.enemies.length===0){ G.waveActive=false; G.betweenT=5; const cb=24+Math.round(G.wave*2.4); G.parts+=cb; beep(520,0.1,'sine',0.12); }
  } else { G.betweenT-=dt; if(G.betweenT<=0) startWave(false); }
  // 敵移動（フローフィールド）
  for(let i=G.enemies.length-1;i>=0;i--){ const e=G.enemies[i]; if(e.dead){ G.enemies.splice(i,1); continue; }
    const cell=worldToCell(e.x,e.z); let c=Math.max(0,Math.min(COLS-1,cell.c)), r=Math.max(0,Math.min(ROWS-1,cell.r));
    const ii=idx(c,r); let fc=flowC[ii], fr=flowR[ii];
    if(fc===0&&fr===0){ fc=-1; fr=0; }                 // フォールバック＝左へ
    let sp=e.speed*(e.slowT>0?0.5:1); if(e.slowT>0)e.slowT-=dt;
    const len=Math.hypot(fc,fr)||1; e.x+=(fc/len)*sp*dt*CELL; e.z+=(fr/len)*sp*dt*CELL;
    e.mesh.position.set(e.x, 0, e.z);
    const heading=Math.atan2(fr,fc); e.mesh.rotation.y=-heading+Math.PI/2;
    // HPバー更新＋ビルボード
    const hb=e.mesh.userData.hpbar; if(hb){ hb.scale.x=Math.max(0.001,e.hp/e.maxhp); hb.position.x=-(1-e.hp/e.maxhp)*0.5; hb.lookAt(camera.position); }
    // 基地到達
    if(e.x < cellToWorld(GOAL_C,BASE_R).x+0.5 && c<=GOAL_C){ damageBase(e); G.enemies.splice(i,1); }
  }
  // タワー：索敵・射撃・旋回
  for(const tw of G.towers){ const def=tw.def; tw.cd-=dt;
    let best=null,bestKey=1e9;
    for(const e of G.enemies){ if(e.dead)continue; const dx=e.x-tw.x, dz=e.z-tw.z; const d2=dx*dx+dz*dz;
      if(d2<=def.range*def.range){ const ii=idx(Math.max(0,Math.min(COLS-1,worldToCell(e.x,e.z).c)),Math.max(0,Math.min(ROWS-1,worldToCell(e.x,e.z).r))); const key=distF[ii]>=0?distF[ii]:9999;
        if(key<bestKey){bestKey=key;best=e;} } }
    if(best){ const ang=Math.atan2(best.z-tw.z, best.x-tw.x); tw.ang=ang;
      const tg=tw.mesh.userData.turret; if(tg) tg.rotation.y=-ang;
      if(tw.cd<=0){ tw.cd=def.cd; fireShot(tw,best); } }
  }
  // 弾
  for(let i=G.shots.length-1;i>=0;i--){ const s=G.shots[i];
    if(!s.target||s.target.dead){ scene.remove(s.mesh); G.shots.splice(i,1); continue; }
    const dx=s.target.x-s.x, dz=s.target.z-s.z, d=Math.hypot(dx,dz);
    const step=s.speed*dt;
    if(d<=step+0.15){ // 命中
      hitEnemy(s.target, s.dmg, s); scene.remove(s.mesh); G.shots.splice(i,1); continue; }
    s.x+=dx/d*step; s.z+=dz/d*step; s.mesh.position.set(s.x, 0.55, s.z);
  }
  // コンボ減衰
  if(G.comboT>0){ G.comboT-=dt; if(G.comboT<=0) G.combo=0; }
  // 基地リング回転
  if(baseMesh) baseMesh.userData.ring.rotation.z+=dt*1.5;
  if(spawnMesh) spawnMesh.userData.ring.rotation.z-=dt*2.0;
  updateFx(dt);
}
function fireShot(tw,target){
  const def=tw.def; const m=new THREE.Mesh(new THREE.SphereGeometry(def.splash>0?0.16:0.1,8,8), new THREE.MeshBasicMaterial({color:def.color}));
  m.position.set(tw.x,0.55,tw.z); scene.add(m);
  G.shots.push({mesh:m,target,x:tw.x,z:tw.z,speed:14,dmg:def.dmg,splash:def.splash,slow:def.slow});
  beep(def.key==='cannon'?180:520, 0.04, def.key==='cannon'?'square':'triangle', 0.06);
}
function hitEnemy(e,dmg,s){
  if(s&&s.splash>0){ for(const o of G.enemies){ if(o.dead)continue; const dx=o.x-e.x,dz=o.z-e.z; if(dx*dx+dz*dz<=s.splash*s.splash){ o.hp-=dmg*(o===e?1:0.6); if(s.slow>0)o.slowT=1.2; if(o.hp<=0)killEnemy(o,true);} } spawnRing(e.x,e.z,0xffb22e); }
  else { e.hp-=dmg; if(s&&s.slow>0)e.slowT=1.2; if(e.hp<=0)killEnemy(e,true); }
}

/* ====================== 入力（カメラ＝ドラッグ / 設置＝タップ） ====================== */
let ptrDown=false, dragged=false, lastX=0,lastY=0, downX=0,downY=0, pinchD=0;
function pointerNDC(x,y){ ndc.set((x/window.innerWidth)*2-1, -(y/window.innerHeight)*2+1); }
function raycastCell(x,y){
  pointerNDC(x,y); raycaster.setFromCamera(ndc,camera);
  const hit=raycaster.intersectObject(groundMesh); if(!hit.length) return null;
  const p=hit[0].point; const cell=worldToCell(p.x,p.z); return inGrid(cell.c,cell.r)?cell:null;
}
const cv=document.getElementById('cv');
cv.addEventListener('pointerdown',e=>{ if(G.scene!=='playing'||G.paused) return; ptrDown=true; dragged=false; lastX=downX=e.clientX; lastY=downY=e.clientY; });
cv.addEventListener('pointermove',e=>{ if(!ptrDown) return;
  const dx=e.clientX-lastX, dy=e.clientY-lastY; lastX=e.clientX; lastY=e.clientY;
  if(Math.abs(e.clientX-downX)>6||Math.abs(e.clientY-downY)>6) dragged=true;
  if(dragged){ camTheta-=dx*0.006; camPhi=Math.max(0.35,Math.min(1.25,camPhi-dy*0.005)); updateCamera(); } });
cv.addEventListener('pointerup',e=>{ if(!ptrDown) return; ptrDown=false;
  if(!dragged && G.scene==='playing' && !G.paused){ const cell=raycastCell(e.clientX,e.clientY);
    if(cell){ placeTower(cell.c,cell.r); } } });
cv.addEventListener('pointercancel',()=>{ ptrDown=false; });
// ピンチズーム
cv.addEventListener('touchstart',e=>{ if(e.touches.length===2){ pinchD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); } },{passive:true});
cv.addEventListener('touchmove',e=>{ if(e.touches.length===2){ const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
  if(pinchD){ camR=Math.max(12,Math.min(40,camR*(pinchD/d))); updateCamera(); } pinchD=d; ptrDown=false; } },{passive:true});
cv.addEventListener('wheel',e=>{ e.preventDefault(); camR=Math.max(12,Math.min(40,camR*(1+Math.sign(e.deltaY)*0.08))); updateCamera(); },{passive:false});

/* ====================== HUD ====================== */
function buildWeaponBar(){ const bar=document.getElementById('bottom'); bar.innerHTML='';
  TOWERS.forEach(t=>{ const b=document.createElement('div'); b.className='wbtn'+(G.sel===t.key?' sel':'');
    b.style.setProperty('--sc','#'+t.color.toString(16).padStart(6,'0'));
    b.innerHTML='<div class="wn">'+t.name+'</div><div class="wc">⚙'+t.cost+'</div>';
    b.addEventListener('click',()=>{ G.sel=t.key; buildWeaponBar(); beep(500,0.04,'sine',0.08); }); bar.appendChild(b); });
}
function syncHUD(){
  document.getElementById('hpfill').style.width=Math.max(0,G.hp/G.hpMax*100)+'%';
  document.getElementById('hpfill').style.background=G.hp>G.hpMax*0.5?'#2fd06a':G.hp>G.hpMax*0.25?'#ffb22e':'#ff3b54';
  document.getElementById('hptxt').textContent=Math.ceil(G.hp)+'/'+G.hpMax;
  document.getElementById('parts').textContent=Math.round(G.parts);
  document.getElementById('wave').textContent=G.wave;
  document.getElementById('score').textContent=G.score.toLocaleString();
  document.getElementById('bSpeed').textContent='x'+G.speed;
  document.getElementById('bPause').textContent=G.paused?'▶':'❚❚';
}
document.getElementById('bNext').addEventListener('click',()=>{ if(G.scene==='playing'&&!G.waveActive){ startWave(true); } });
document.getElementById('bSpeed').addEventListener('click',()=>{ G.speed=G.speed>=3?1:G.speed+1; });
document.getElementById('bPause').addEventListener('click',()=>{ G.paused=!G.paused; });
document.getElementById('bStart').addEventListener('click',startGame);

function startGame(){
  document.getElementById('ov').classList.add('hidden');
  G.scene='playing'; G.parts=200; G.hp=100; G.wave=0; G.score=0; G.kills=0; G.combo=0;
  G.towers.forEach(t=>scene.remove(t.mesh)); G.enemies.forEach(e=>scene.remove(e.mesh)); G.shots.forEach(s=>scene.remove(s.mesh)); G.fx.forEach(f=>scene.remove(f.mesh));
  G.towers=[]; G.enemies=[]; G.shots=[]; G.fx=[]; occ.fill(0); G.flowDirty=true; buildFlow();
  G.waveActive=false; G.betweenT=3; G.paused=false; G.sel='gun'; buildWeaponBar(); initAudio();
}
function gameOver(){
  G.scene='gameover';
  const ov=document.getElementById('ov'); ov.classList.remove('hidden');
  ov.querySelector('.yr').textContent='GAME OVER';
  ov.querySelector('h1').textContent='W'+G.wave+'  ★'+G.score.toLocaleString();
  ov.querySelector('.vs').innerHTML='<span class="mid">☠ '+G.kills+' destroyed</span>';
  ov.querySelector('.play').textContent='▶';
}

/* ====================== Audio（最小） ====================== */
let AC=null,master=null;
function initAudio(){ if(AC)return; try{ AC=new (window.AudioContext||window.webkitAudioContext)(); master=AC.createGain(); master.gain.value=0.5; master.connect(AC.destination);}catch(e){} }
function beep(f,dur,type,vol){ if(!AC)return; const o=AC.createOscillator(),g=AC.createGain(); o.type=type||'sine'; o.frequency.value=f;
  g.gain.value=vol||0.1; o.connect(g); g.connect(master); const t=AC.currentTime; o.start(t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.stop(t+dur+0.02); }

/* ====================== ループ ====================== */
let last=0, acc=0; const STEP=1/60;
function loop(now){
  const t=now/1000; let frame=last?t-last:0; last=t; if(frame>0.25)frame=0.25;
  if(!G.paused && G.scene==='playing'){ acc+=frame*G.speed; if(acc>STEP*5)acc=STEP*5; while(acc>=STEP){ update(STEP); acc-=STEP; } }
  syncHUD();
  if(composer) composer.render(); else if(renderer) renderer.render(scene,camera);
  requestAnimationFrame(loop);
}

// 起動
if(THREEOK){ initScene(); buildWeaponBar(); requestAnimationFrame(loop); }
else { document.getElementById('ov').innerHTML='<div style="color:#ff3b54;font:700 18px sans-serif">3Dエンジンの読み込みに失敗しました（ネット接続を確認してください）</div>'; }
</script>
