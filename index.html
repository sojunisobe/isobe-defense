<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0e14">
<title>磯部防衛戦線 — ISOBE DEFENSE</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
  html,body{width:100%;height:100%;background:#05070c;overflow:hidden;position:fixed;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;touch-action:none;color:#eef;}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#05070c;
    padding:max(6px,env(safe-area-inset-top)) max(6px,env(safe-area-inset-right)) max(6px,env(safe-area-inset-bottom)) max(6px,env(safe-area-inset-left));
    box-sizing:border-box;}
  /* 論理 960x440。サイズ・解像度はJSが端末に合わせて設定（Retina対応） */
  #wrap{position:relative;}
  canvas{position:absolute;left:0;top:0;display:block;}
  /* 縦持ち警告 */
  #rotate{position:fixed;inset:0;background:#05070c;z-index:999;display:none;
    flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;padding:24px;}
  #rotate.show{display:flex;}
  #rotate .ico{font-size:64px;animation:rot 2s ease-in-out infinite;}
  @keyframes rot{0%,40%{transform:rotate(0)}60%,100%{transform:rotate(90deg)}}
  #rotate h2{font-size:22px;color:#ffd23f;}
  #rotate p{font-size:14px;color:#9aa;}
</style>
</head>
<body>
<div id="stage">
  <div id="wrap">
    <canvas id="cv" width="1280" height="720"></canvas>
    <canvas id="ui" width="1280" height="720"></canvas>
  </div>
</div>
<div id="rotate">
  <div class="ico">📱</div>
  <h2>横画面にしてください</h2>
  <p>本体を横向きにすると戦場が表示されます</p>
</div>

<script>
"use strict";
/* ============================================================================
   磯部防衛戦線 — ISOBE DEFENSE
   横画面タワーディフェンス / 1ファイル完結 / WebAudio生成サウンド
   味方=磯部軍（死なない） 敵=高野DRC軍（右→左へ侵攻）
   ============================================================================ */

// 論理座標は端末横画面に合わせた 960x440（iPhone横の比率にほぼ一致）
const W = 960, H = 440;
const cv = document.getElementById('cv');   // 戦場レイヤー
const ux = document.getElementById('ui');   // UIレイヤー
const ctx = cv.getContext('2d');
const uctx = ux.getContext('2d');

/* ---------- 画面フィット（DPR対応・等比拡大で画面いっぱい） ---------- */
let VIEWSCALE = 1;   // 論理px→デバイスpx（CSS拡大率×DPR）
function fit(){
  let ww=window.innerWidth, wh=window.innerHeight;
  try{ const _cs=getComputedStyle(document.getElementById('stage'));
    const pl=parseFloat(_cs.paddingLeft), pr=parseFloat(_cs.paddingRight), pt=parseFloat(_cs.paddingTop), pb=parseFloat(_cs.paddingBottom);
    const aw=ww-((pl||0)+(pr||0)), ah=wh-((pt||0)+(pb||0));
    if(aw>50 && ah>50){ ww=aw; wh=ah; }   // セーフエリア控除（異常値は無視＝描画が壊れない）
  }catch(e){}
  const portrait = wh > ww;
  document.getElementById('rotate').classList.toggle('show', portrait);
  const dpr = Math.min(window.devicePixelRatio||1, 3);
  const scale = Math.min(ww / W, wh / H);     // 画面に収まる最大倍率
  const cssW = W*scale, cssH = H*scale;
  VIEWSCALE = scale*dpr;
  const wrap = document.getElementById('wrap');
  wrap.style.width = cssW+'px'; wrap.style.height = cssH+'px';
  for(const c of [cv, ux]){
    c.style.width = cssW+'px'; c.style.height = cssH+'px';
    c.width = Math.round(cssW*dpr); c.height = Math.round(cssH*dpr);
  }
  // 解像度変更でcontextの状態がリセットされるため再設定はループ側で毎フレ行う
}
window.addEventListener('resize', fit);
window.addEventListener('orientationchange', ()=>setTimeout(fit,200));
fit();

/* ============================================================================
   レイアウト：上=細HUD / 中央=戦場(最大化) / 下=兵器バー
   ============================================================================ */
const HUD_H = 46;
const BAR_H = 104;                        // 下の兵器バー
const FIELD = { x:0, y:HUD_H, w:W, h:H-HUD_H };  // 戦場は全高（兵器バーは下に重ねるオーバーレイ＝常時占有しない）
const CELL = 36;                          // マスを小さく＝置ける場所を増やす
const ROWS = Math.floor(FIELD.h / CELL);  // 8
const SCREEN_COLS = Math.floor(W / CELL); // 26（1画面分）
const WCOLS = SCREEN_COLS*2;              // 52（横2画面のワールド）
const COLS = WCOLS;                       // 互換用エイリアス
const WORLD_W = WCOLS*CELL;               // ≒1872
const OX = 0;                             // ワールド原点（gx=0=最左）
const OY = FIELD.y + Math.floor((FIELD.h - ROWS*CELL)/2);
function cellCenter(gx,gy){ return { x:OX+gx*CELL+CELL/2, y:OY+gy*CELL+CELL/2 }; }
const SPEED_SCALE = 1.05;   // 2画面幅を快適に横断できるテンポへ（難度も少し上昇）
function inField(gx,gy){ return gx>=0&&gy>=0&&gx<WCOLS&&gy<ROWS; }

/* ---------- 迷路型：基地=最左 / 敵=右中央の1箇所から / 味方タワーが壁＝道を形作る ---------- */
const idxOf=(gx,gy)=>gy*WCOLS+gx;
const occ    = new Uint8Array(WCOLS*ROWS);   // 1=タワーで通行不可(地上)
const distF  = new Int32Array(WCOLS*ROWS);   // 基地からの歩数(-1=未到達/壁)
const flowDX = new Float32Array(WCOLS*ROWS); // 各セル→基地方向(単位)
const flowDY = new Float32Array(WCOLS*ROWS);
const GOAL_GX = 0;                           // 基地ゴール列
const BASE_GY = Math.floor(ROWS/2);          // 基地の行（中央）
const SPAWN_GX = WCOLS-1;                     // 敵スポーン列(最右)
const SPAWN_GY = Math.floor(ROWS/2);          // 出現は右中央の1箇所のみ
const SPAWN_CELLS = [SPAWN_GY];               // （単一スポーン）
const BASE = cellCenter(GOAL_GX, BASE_GY);    // 基地代表座標(描画/飛行目標/リーク)

const _bfsQ = new Int32Array(WCOLS*ROWS);
// 基地(最左列)からの距離場＋方向場を再構築（タワー設置/売却時のみ）
function buildFlow(){
  distF.fill(-1);
  let head=0, tail=0;
  for(let gy=0; gy<ROWS; gy++){ const i=idxOf(GOAL_GX,gy); if(!occ[i]){ distF[i]=0; _bfsQ[tail++]=i; } }
  while(head<tail){
    const i=_bfsQ[head++]; const gx=i%WCOLS, gy=(i/WCOLS)|0, d=distF[i]+1;
    if(gx+1<WCOLS){ const j=i+1;     if(!occ[j]&&distF[j]<0){ distF[j]=d; _bfsQ[tail++]=j; } }
    if(gx-1>=0)   { const j=i-1;     if(!occ[j]&&distF[j]<0){ distF[j]=d; _bfsQ[tail++]=j; } }
    if(gy+1<ROWS) { const j=i+WCOLS; if(!occ[j]&&distF[j]<0){ distF[j]=d; _bfsQ[tail++]=j; } }
    if(gy-1>=0)   { const j=i-WCOLS; if(!occ[j]&&distF[j]<0){ distF[j]=d; _bfsQ[tail++]=j; } }
  }
  for(let gy=0; gy<ROWS; gy++) for(let gx=0; gx<WCOLS; gx++){
    const i=idxOf(gx,gy); flowDX[i]=0; flowDY[i]=0;
    if(distF[i]<0) continue;
    let best=distF[i], bx=0, by=0;
    if(gx+1<WCOLS && distF[i+1]>=0 && distF[i+1]<best){ best=distF[i+1]; bx=1; by=0; }
    if(gx-1>=0    && distF[i-1]>=0 && distF[i-1]<best){ best=distF[i-1]; bx=-1; by=0; }
    if(gy+1<ROWS  && distF[i+WCOLS]>=0 && distF[i+WCOLS]<best){ best=distF[i+WCOLS]; bx=0; by=1; }
    if(gy-1>=0    && distF[i-WCOLS]>=0 && distF[i-WCOLS]<best){ best=distF[i-WCOLS]; bx=0; by=-1; }
    flowDX[i]=bx; flowDY[i]=by;
  }
}
// 候補セルを壁化しても、いずれかのスポーンが基地と連結か（全封鎖の禁止）
const _seen = new Uint8Array(WCOLS*ROWS);
function reachableAfter(gx,gy){
  const ti=idxOf(gx,gy), prev=occ[ti]; occ[ti]=1;
  _seen.fill(0); let head=0, tail=0;
  for(let yy=0; yy<ROWS; yy++){ const i=idxOf(GOAL_GX,yy); if(!occ[i]){ _seen[i]=1; _bfsQ[tail++]=i; } }
  while(head<tail){ const i=_bfsQ[head++]; const x=i%WCOLS, y=(i/WCOLS)|0;
    if(x+1<WCOLS){const j=i+1;     if(!occ[j]&&!_seen[j]){_seen[j]=1;_bfsQ[tail++]=j;}}
    if(x-1>=0)   {const j=i-1;     if(!occ[j]&&!_seen[j]){_seen[j]=1;_bfsQ[tail++]=j;}}
    if(y+1<ROWS) {const j=i+WCOLS; if(!occ[j]&&!_seen[j]){_seen[j]=1;_bfsQ[tail++]=j;}}
    if(y-1>=0)   {const j=i-WCOLS; if(!occ[j]&&!_seen[j]){_seen[j]=1;_bfsQ[tail++]=j;}}
  }
  occ[ti]=prev;
  for(const gyS of SPAWN_CELLS){ if(_seen[idxOf(SPAWN_GX,gyS)]) return true; }
  return false;
}
// 連結しているスポーン行をランダムに1つ返す
function pickSpawnRow(){
  const ok=SPAWN_CELLS.filter(gy=>distF[idxOf(SPAWN_GX,gy)]>=0);
  const pool=ok.length?ok:SPAWN_CELLS;
  return pool[Math.floor(Math.random()*pool.length)];
}

/* ============================================================================
   ゲーム状態
   ============================================================================ */
const G = {
  scene:'title',         // title | playing | gameover
  parts: 200,            // 部品（通貨）
  baseHP: 100, baseMax: 100,
  wave: 0,               // 現在ウェーブ
  best: +(localStorage.getItem('isobe_best')||0),
  speed: 1,              // 1 / 2 / 3(=早回し)
  paused:false,
  muted:false,
  towers: [],
  enemies: [],
  shots: [],             // 飛翔体
  fx: [],                // エフェクト
  floats: [],            // ダメージ表示
  selectedPalette: null, // 配置しようとしているタワーkey
  selectedTower: null,   // 選択中の設置済みタワー
  hoverCell: null,
  spawnQueue: [],        // このウェーブの残り出撃
  spawnTimer: 0,
  waveActive: false,
  betweenTimer: 0,       // 次ウェーブまでの猶予
  toast: null, toastT:0,
  shake:0, bossWarnT:0,
  score:0, combo:0, comboT:0, bestScore:+(localStorage.getItem('isobe_bestscore')||0),
  camX:0, layoutVer:0, flowDirty:true, placeGhost:null,
  hitStop:0, announce:null, announceT:0,
  barOpen:false,   // ハンバーガー＝最初は隠れている。☰で出す
  partsDisp:200, scoreDisp:0, hpDisp:100, fade:0,
};

/* ============================================================================
   敵アーキタイプ（描画）— 凝ったパラメトリック・スプライト
   domain: ground / air
   ============================================================================ */
function shade(c, amt){ // 簡易明度調整
  const n=parseInt(c.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.max(0,Math.min(255,r+amt));g=Math.max(0,Math.min(255,g+amt));b=Math.max(0,Math.min(255,b+amt));
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}
const ARCH = {
  // ----- 地上 -----
  soldier(g,e,t){ const s=e.size, walk=Math.sin(t*10+e.seed)*3, c=e.color;
    g.fillStyle=shade(c,-40); g.fillRect(-3, s*0.2+walk, 4, s*0.5);     // 脚
    g.fillStyle=c; g.fillRect(-1, -s*0.1-walk, 4, s*0.5);
    g.fillStyle=shade(c,20); g.fillRect(-s*0.4,-s*0.4,s*0.8,s*0.7);     // 胴
    g.fillStyle='#e8c79a'; g.beginPath(); g.arc(0,-s*0.55,s*0.28,0,7); g.fill(); // 頭
    g.fillStyle=shade(c,-20); g.fillRect(-s*0.3,-s*0.78,s*0.6,s*0.22);  // ヘルメット
    g.fillStyle='#333'; g.fillRect(-s*0.7,-s*0.2,s*0.9,s*0.14);         // 銃
  },
  heavy(g,e,t){ const s=e.size, walk=Math.sin(t*7+e.seed)*2, c=e.color;
    g.fillStyle=shade(c,-50); g.fillRect(-s*0.4,s*0.2+walk*0.5,s*0.35,s*0.55);
    g.fillStyle=shade(c,-50); g.fillRect(s*0.05,s*0.2-walk*0.5,s*0.35,s*0.55);
    g.fillStyle=c; g.fillRect(-s*0.55,-s*0.45,s*1.1,s*0.85);            // 重装甲胴
    g.fillStyle=shade(c,30); g.fillRect(-s*0.55,-s*0.45,s*1.1,s*0.2);
    g.fillStyle='#bcd'; g.fillRect(-s*0.7,-s*0.3,s*0.18,s*0.6);         // シールド
    g.fillStyle='#9ab'; g.fillRect(-s*0.72,-s*0.32,s*0.06,s*0.64);
    g.fillStyle='#e8c79a'; g.beginPath(); g.arc(0,-s*0.6,s*0.24,0,7); g.fill();
    g.fillStyle=shade(c,-30); g.fillRect(-s*0.28,-s*0.85,s*0.56,s*0.28);
  },
  bike(g,e,t){ const s=e.size,c=e.color,wh=t*16;
    g.fillStyle='#111'; g.beginPath();g.arc(-s*0.5,s*0.35,s*0.3,0,7);g.fill();
    g.beginPath();g.arc(s*0.5,s*0.35,s*0.3,0,7);g.fill();
    g.strokeStyle='#555';g.lineWidth=3;
    for(let k=0;k<4;k++){const a=wh+k*1.57;g.beginPath();g.moveTo(-s*0.5,s*0.35);g.lineTo(-s*0.5+Math.cos(a)*s*0.26,s*0.35+Math.sin(a)*s*0.26);g.stroke();}
    g.fillStyle=c; g.fillRect(-s*0.4,-s*0.1,s*0.8,s*0.32);              // 車体
    g.fillStyle=shade(c,40); g.fillRect(-s*0.4,-s*0.1,s*0.8,s*0.1);
    g.fillStyle='#e8c79a'; g.beginPath();g.arc(-s*0.05,-s*0.35,s*0.2,0,7);g.fill(); // 乗員
    g.fillStyle=shade(c,-30); g.fillRect(-s*0.2,-s*0.5,s*0.3,s*0.16);
  },
  tank(g,e,t){ const s=e.size,c=e.color,track=(t*30)%8;
    g.fillStyle='#1a1a1a'; g.fillRect(-s*0.7,s*0.2,s*1.4,s*0.34);       // 履帯
    g.fillStyle='#444'; for(let x=-s*0.65;x<s*0.7;x+=8){ g.fillRect(x+track-8,s*0.22,4,s*0.3); }
    g.fillStyle=shade(c,-15); g.fillRect(-s*0.65,-s*0.1,s*1.3,s*0.35);  // 車体
    g.fillStyle=c; g.fillRect(-s*0.4,-s*0.42,s*0.75,s*0.4);             // 砲塔
    g.fillStyle=shade(c,30); g.fillRect(-s*0.4,-s*0.42,s*0.75,s*0.12);
    g.fillStyle='#333'; g.fillRect(-s*0.9,-s*0.3,s*0.6,s*0.12);         // 砲身（左向き）
  },
  mech(g,e,t){ const s=e.size,c=e.color,step=Math.sin(t*6+e.seed)*4;
    g.fillStyle=shade(c,-50); g.fillRect(-s*0.45,s*0.1+step,s*0.28,s*0.6); // 脚
    g.fillStyle=shade(c,-50); g.fillRect(s*0.17,s*0.1-step,s*0.28,s*0.6);
    g.fillStyle=c; g.fillRect(-s*0.5,-s*0.55,s*1.0,s*0.7);              // 胴体
    g.fillStyle=shade(c,35); g.fillRect(-s*0.5,-s*0.55,s*1.0,s*0.18);
    g.fillStyle='#f33'; g.fillRect(-s*0.3,-s*0.3,s*0.6,s*0.12);         // バイザー
    g.fillStyle=shade(c,-20); g.fillRect(-s*0.78,-s*0.4,s*0.28,s*0.5);  // 腕（武器）
    g.fillStyle='#333'; g.fillRect(-s*0.95,-s*0.28,s*0.25,s*0.16);
  },
  spider(g,e,t){ const s=e.size,c=e.color;
    g.strokeStyle=shade(c,-40);g.lineWidth=4;
    for(let k=0;k<4;k++){ const ph=Math.sin(t*8+k*1.6+e.seed)*0.3;
      g.beginPath();g.moveTo(0,0);g.lineTo(-s*0.6,s*0.5+ph*20);g.stroke();
      g.beginPath();g.moveTo(0,0);g.lineTo(s*0.6,s*0.5-ph*20);g.stroke();
      g.beginPath();g.moveTo(0,0);g.lineTo(-s*0.7-k*4,-s*0.1+ph*15);g.stroke();
      g.beginPath();g.moveTo(0,0);g.lineTo(s*0.7+k*4,-s*0.1-ph*15);g.stroke();
    }
    g.fillStyle=c; g.beginPath();g.ellipse(0,0,s*0.55,s*0.42,0,0,7);g.fill();
    g.fillStyle=shade(c,30);g.beginPath();g.ellipse(0,-s*0.1,s*0.4,s*0.25,0,0,7);g.fill();
    g.fillStyle='#f44';g.beginPath();g.arc(-s*0.15,-s*0.05,3,0,7);g.fill();g.beginPath();g.arc(s*0.15,-s*0.05,3,0,7);g.fill();
  },
  boss(g,e,t){ const s=e.size,c=e.color,step=Math.sin(t*4+e.seed)*5;
    g.fillStyle=shade(c,-55);g.fillRect(-s*0.5,s*0.2+step,s*0.34,s*0.7);
    g.fillStyle=shade(c,-55);g.fillRect(s*0.16,s*0.2-step,s*0.34,s*0.7);
    g.fillStyle=c;g.fillRect(-s*0.7,-s*0.7,s*1.4,s*1.0);
    g.fillStyle=shade(c,40);g.fillRect(-s*0.7,-s*0.7,s*1.4,s*0.2);
    g.fillStyle='#222';g.fillRect(-s*0.5,-s*0.4,s*1.0,s*0.22);
    g.fillStyle='#ff3b3b';g.fillRect(-s*0.42,-s*0.36,s*0.84,s*0.14);    // 目ライン
    g.fillStyle=shade(c,-25);g.fillRect(-s*1.0,-s*0.5,s*0.34,s*0.7);    // 大砲腕
    g.fillStyle='#333';g.fillRect(-s*1.2,-s*0.3,s*0.3,s*0.28);
    g.fillStyle=shade(c,-25);g.fillRect(s*0.66,-s*0.5,s*0.34,s*0.7);
  },
  // ----- 空中 -----
  drone(g,e,t){ const s=e.size,c=e.color,r=t*40;
    g.strokeStyle='#888';g.lineWidth=3;
    g.beginPath();g.moveTo(-s*0.5,-s*0.4);g.lineTo(s*0.5,s*0.4);g.stroke();
    g.beginPath();g.moveTo(s*0.5,-s*0.4);g.lineTo(-s*0.5,s*0.4);g.stroke();
    for(const[sx,sy]of[[-1,-1],[1,-1],[-1,1],[1,1]]){
      g.fillStyle='rgba(180,200,255,0.5)';g.beginPath();g.ellipse(sx*s*0.5,sy*s*0.4,s*0.22,s*0.07,r,0,7);g.fill();
    }
    g.fillStyle=c;g.beginPath();g.arc(0,0,s*0.3,0,7);g.fill();
    g.fillStyle=shade(c,40);g.beginPath();g.arc(0,-s*0.05,s*0.18,0,7);g.fill();
    g.fillStyle='#f55';g.beginPath();g.arc(0,0,s*0.07,0,7);g.fill();
  },
  jet(g,e,t){ const s=e.size,c=e.color;
    g.fillStyle=c;g.beginPath();g.moveTo(-s*0.8,0);g.lineTo(s*0.5,-s*0.18);g.lineTo(s*0.55,s*0.18);g.closePath();g.fill();
    g.fillStyle=shade(c,-30);g.beginPath();g.moveTo(s*0.1,-s*0.05);g.lineTo(s*0.4,-s*0.5);g.lineTo(s*0.5,-s*0.1);g.closePath();g.fill();
    g.beginPath();g.moveTo(s*0.1,s*0.05);g.lineTo(s*0.4,s*0.5);g.lineTo(s*0.5,s*0.1);g.closePath();g.fill();
    g.fillStyle='#9df';g.beginPath();g.arc(-s*0.4,0,s*0.12,0,7);g.fill(); // コクピット
    g.fillStyle='rgba(255,160,60,'+(0.5+0.4*Math.sin(t*30))+')';        // 噴射
    g.beginPath();g.moveTo(s*0.55,-s*0.1);g.lineTo(s*0.9,0);g.lineTo(s*0.55,s*0.1);g.closePath();g.fill();
  },
  blimp(g,e,t){ const s=e.size,c=e.color,bob=Math.sin(t*2+e.seed)*3;

// レベルごとの倍率
function lvlStat(def, lv){
  const dmgMul = [1,1.45,2.0,2.7,3.6][lv-1];
  const rngMul = [1,1.06,1.12,1.18,1.26][lv-1];
  const cdMul  = [1,0.9,0.82,0.74,0.66][lv-1];
  return {
    dmg: def.dmg*dmgMul,
    range: def.range*rngMul,
    cd: def.cd*cdMul,
  };
}
// 建設費・強化費
function buildCost(def){ return def.cost; }
function upCost(def, lv){ return Math.round(def.cost * (0.7+lv*0.55)); }
function sellValue(twr){ const def=TOWER_BY_KEY[twr.key]; let v=def.cost; for(let l=1;l<twr.lv;l++)v+=upCost(def,l); return Math.round(v*0.6); }

/* ============================================================================
   ウェーブ生成（エンドレス・漸増）
   ============================================================================ */
function buildWave(n){
  // n: 1..  難度に応じて出現プールと数と倍率
  const tier = Math.min(ENEMY_DEFS.length-5, Math.floor(n*0.9));
  const hpMul = 1 + (n-1)*0.085 + Math.pow(n/12,2)*0.4;
  const spdMul = 1 + Math.min(0.6,(n-1)*0.012);
  const rewardMul = 1 + (n-1)*0.03;
  const count = 8 + Math.floor(n*1.6);
  const q=[];
  // 通常敵
  const lo = Math.max(0, tier-10), hi = Math.min(ENEMY_DEFS.length-6, tier+2);
  for(let i=0;i<count;i++){
    const idx = lo + Math.floor(Math.random()*(hi-lo+1));
    q.push({ def: ENEMY_DEFS[idx], hpMul, spdMul, rewardMul, gap: 0.55 + Math.random()*0.25 });
  }
  // 10ウェーブごとにボス
  if(n%10===0){
    const bossPool = ENEMY_DEFS.slice(-5);
    const boss = bossPool[Math.floor((n/10-1)%bossPool.length)];
    q.push({ def: boss, hpMul:hpMul*(1+n/40), spdMul:spdMul*0.8, rewardMul:rewardMul*2, gap:0.1, boss:true });
  }
  // 軽くシャッフル（種類が散る）
  return q;
}
function startNextWave(early){
  G.wave++;
  G.spawnQueue = buildWave(G.wave);
  G.spawnTimer = 0;
  G.waveActive = true;
  G.betweenTimer = 0;
  if(early) G.parts += 20 + G.wave*2;   // 早出しボーナス
  if(G.spawnQueue.some(s=>s.boss)){ sfx.bossWarn(); toast('⚠ ボス出現！ ウェーブ '+G.wave); }
  else toast('ウェーブ '+G.wave+' 開始');
  sfx.waveStart();
}

/* ============================================================================

   ============================================================================ */
function towerAtCell(gx,gy){ return G.towers.find(t=>t.gx===gx&&t.gy===gy); }
// 占有のみ（軽い判定）：範囲内・基地列/スポーン列でない・空き
function cellFree(gx,gy){
  if(!inField(gx,gy)) return false;
  if(gx===GOAL_GX && gy===BASE_GY) return false;    // 基地マスのみ禁止
  if(gx===SPAWN_GX && gy===SPAWN_GY) return false;  // 出現マスのみ禁止
  if(occ[idxOf(gx,gy)]) return false;
  return true;
}
// 配置可否：占有＋「全経路を塞がない」連結チェック
function canBuild(gx,gy){
  if(!cellFree(gx,gy)) return false;
  return reachableAfter(gx,gy);
}
// 「置くと封鎖になる空きセル」を配置レイアウト毎に1回だけ算出しキャッシュ（毎フレBFS回避）
let _blockSet=new Set(), _blockVer=-1;
function blockSet(){
  if(_blockVer===G.layoutVer) return _blockSet;
  _blockSet=new Set();
  for(let gy=0;gy<ROWS;gy++)for(let gx=0;gx<WCOLS;gx++){
    if(cellFree(gx,gy) && !reachableAfter(gx,gy)) _blockSet.add(gx+','+gy);
  }
  _blockVer=G.layoutVer;
  return _blockSet;
}
function placeTower(key, gx, gy){
  const def=TOWER_BY_KEY[key];
  if(!cellFree(gx,gy)){ sfx.error(); return false; }
  if(!reachableAfter(gx,gy)){ sfx.error(); toast('道を塞げません'); return false; }
  if(G.parts < def.cost){ sfx.error(); toast('部品が足りません'); return false; }
  G.parts -= def.cost;
  const c=cellCenter(gx,gy);
  G.towers.push({ key, def, gx, gy, x:c.x, y:c.y, lv:1, cd:0, ang:Math.PI, target:null, fireFx:0, recoil:0, targetMode:'first', spawnT:0, upFlash:0 });
  occ[idxOf(gx,gy)]=1; G.flowDirty=true;          // 壁を更新→経路再計算
  fxRing(c.x,c.y,CELL*0.85,def.acc); G.shake=Math.max(G.shake,3);   // 設置の手応え
  for(let i=0;i<6;i++){ const a=Math.random()*6.28,sp=40+Math.random()*70; G.fx.push({type:'particle',x:c.x,y:c.y+14,vx:Math.cos(a)*sp,vy:-Math.random()*60,life:0.3,color:'#6a5a3a',r:2}); }
  sfx.build();
  return true;
}

/* ============================================================================
   戦闘ロジック
   ============================================================================ */
function canHit(twr, e){
  const tg=twr.def.target;
  if(tg==='both') return true;
  return tg===e.domain;
}
function buffAt(x,y){
  // 周囲のブースター効果（攻撃力倍率・連射倍率）
  let atk=0, spd=0;
  for(const b of G.towers){
    if(b.def.atkType!=='buff') continue;
    const r=lvlStat(b.def,b.lv).range;
    if(Math.hypot(b.x-x,b.y-y)<=r){ atk+=b.def.buffAtk*b.lv*0.4+b.def.buffAtk; spd+=b.def.buffSpd; }
  }
  return {atk:1+atk, spd:1+spd};
}
function towerLogic(twr, dt){
  const def=twr.def, st=lvlStat(def,twr.lv);
  if(twr.spawnT==null) twr.spawnT=1; if(twr.spawnT<1) twr.spawnT+=dt*4;   // 設置ポップ進行
  if(twr.upFlash>0) twr.upFlash-=dt;
  if(twr.recoil>0) twr.recoil-=dt*6;
  if(twr.fireFx>0) twr.fireFx-=dt;
  // 支援は攻撃しない
  if(def.atkType==='buff' || def.atkType==='barrier'){
    if(def.atkType==='barrier'){
      twr.cd-=dt;
      if(twr.cd<=0){
        twr.cd=st.cd;
        let any=false;
        for(const e of G.enemies){ if(e.dead)continue; if(Math.hypot(e.x-twr.x,e.y-twr.y)<=st.range && canHit(twr,e)){ e.stunT=Math.max(e.stunT,def.stun); any=true; } }
        if(any){ twr.fireFx=0.2; sfx.barrier(); fxRing(twr.x,twr.y,st.range,def.acc); }
      }
    }
    return;
  }
  twr.cd-=dt;
  // 索敵：優先度モードに応じて射程内から1体選ぶ
  const mode=twr.targetMode||'first';
  let best=null, bestScore=-Infinity;
  for(const e of G.enemies){
    if(e.dead) continue;
    if(!canHit(twr,e)) continue;
    const dd=Math.hypot(e.x-twr.x,e.y-twr.y);
    if(dd>st.range) continue;
    let sc;
    switch(mode){
      case 'last':   sc=e.prog; break;        // 最後尾（基地から遠い＝prog大）
      case 'strong': sc=e.hp; break;          // 残HP最大
      case 'weak':   sc=-e.hp; break;         // 瀕死（とどめ）
      default:       sc=-e.prog;              // 先頭（基地に近い＝prog小）
    }
    if(sc>bestScore){ best=e; bestScore=sc; }
  }
  twr.target=best;
  if(best){ twr.ang = Math.atan2(best.y-twr.y, best.x-twr.x); }
  if(twr.cd>0 || !best) return;

  const bf = buffAt(twr.x,twr.y);
  twr.cd = st.cd / bf.spd;
  let dmg = st.dmg * bf.atk;
  twr.recoil=1; twr.fireFx=0.12;
  fire(twr, best, st, dmg);
}

function fire(twr, target, st, dmg){
  const def=twr.def;
  switch(def.atkType){
    case 'bullet':
      G.shots.push({type:'bullet',x:twr.x,y:twr.y,tx:target.x,ty:target.y,target,spd:760,dmg,color:def.acc,life:1});
      sfx.shot(); break;
    case 'shell':
      G.shots.push({type:'shell',x:twr.x,y:twr.y,sx:twr.x,sy:twr.y,tx:target.x,ty:target.y,
        t:0,dur:Math.hypot(target.x-twr.x,target.y-twr.y)/420+0.15,dmg,splash:def.splash,color:def.acc});
      sfx.cannon(); break;
    case 'missile':
      G.shots.push({type:'missile',x:twr.x,y:twr.y,target,spd:520,turn:6,dmg,splash:def.splash,color:def.acc,
        vx:Math.cos(twr.ang)*300,vy:Math.sin(twr.ang)*300,life:3});
      sfx.missile(); break;
    case 'beam':{
      const crit = def.crit && Math.random()<0.22;
      const real = crit?dmg*2.2:dmg;
      applyDamage(target, real, twr, crit);
      G.fx.push({type:'beam',x1:twr.x,y1:twr.y,x2:target.x,y2:target.y,color:def.acc,life:crit?0.18:0.1,w:def.key==='sniper'?3:2});
      def.key==='sniper'?sfx.sniper():sfx.laser(); break; }
    case 'flame':{
      twr.fireFx=0.1;
      G.fx.push({type:'flame',x:twr.x,y:twr.y,ang:twr.ang,range:st.range,life:0.12,color:def.acc});
      for(const e of G.enemies){ if(e.dead||!canHit(twr,e))continue;
        if(Math.hypot(e.x-twr.x,e.y-twr.y)<=st.range){ applyDamage(e,dmg,twr,false); } }
      sfx.flame(); break; }
    case 'ice':
      G.shots.push({type:'shell',x:twr.x,y:twr.y,sx:twr.x,sy:twr.y,tx:target.x,ty:target.y,
        t:0,dur:Math.hypot(target.x-twr.x,target.y-twr.y)/520+0.1,dmg,splash:def.splash,color:def.acc,
        slow:def.slow,slowDur:def.slowDur,ice:true});
      sfx.ice(); break;
    case 'chain':{
      const hit=[target]; let cur=target;
      for(let k=1;k<def.chain;k++){
        let nx=null,nd=90;
        for(const e of G.enemies){ if(e.dead||hit.includes(e)||!canHit(twr,e))continue;
          const dd=Math.hypot(e.x-cur.x,e.y-cur.y); if(dd<nd){nd=dd;nx=e;} }
        if(!nx)break; hit.push(nx); cur=nx;
      }
      let prev={x:twr.x,y:twr.y};
      for(const e of hit){ applyDamage(e,dmg,twr,false);
        G.fx.push({type:'chain',x1:prev.x,y1:prev.y,x2:e.x,y2:e.y,color:def.acc,life:0.14}); prev=e; }
      sfx.tesla(); break; }
    case 'poison':
      G.shots.push({type:'shell',x:twr.x,y:twr.y,sx:twr.x,sy:twr.y,tx:target.x,ty:target.y,
        t:0,dur:Math.hypot(target.x-twr.x,target.y-twr.y)/440+0.12,dmg,splash:def.splash,color:def.acc,
        dot:def.dot,dotDur:def.dotDur,poison:true});
      sfx.poison(); break;
    case 'rail':{
      // 直線貫通
      const dx=Math.cos(twr.ang),dy=Math.sin(twr.ang), ex=twr.x+dx*st.range, ey=twr.y+dy*st.range;
      for(const e of G.enemies){ if(e.dead||!canHit(twr,e))continue;
        const proj=((e.x-twr.x)*dx+(e.y-twr.y)*dy);
        if(proj<0||proj>st.range)continue;
        const px=twr.x+dx*proj, py=twr.y+dy*proj;
        if(Math.hypot(e.x-px,e.y-py)<=e.size*0.7+10){ applyDamage(e,dmg,twr,false); } }
      G.fx.push({type:'rail',x1:twr.x,y1:twr.y,x2:ex,y2:ey,color:def.acc,life:0.2});
      sfx.rail(); break; }
  }
}

function applyDamage(e, dmg, twr, crit){
  if(e.dead) return;
  const def=twr?twr.def:null;
  let real = dmg;
  // 毒・継続は装甲無視扱い、それ以外は装甲で軽減
  if(!def || def.atkType!=='poison'){ real = Math.max(1, dmg - e.armor*0.5); }
  e.hp -= real; e.hitFlash=0.12;
  G.floats.push({x:e.x,y:e.y-e.size*0.6,txt:Math.round(real),t:0,crit:!!crit});
  if(def && def.atkType==='ice' && def.slow){ e.slowT=Math.max(e.slowT,def.slowDur); e.slowAmt=def.slow; }
  if(def && def.dot){ e.dots.push({dps:def.dot,t:def.dotDur}); }
  if(e.hp<=0) killEnemy(e);
}
function splashDamage(x,y,r,dmg,twr,opts){
  for(const e of G.enemies){ if(e.dead)continue;
    if(twr && !canHit(twr,e)) continue;
    const dd=Math.hypot(e.x-x,e.y-y);
    if(dd<=r){ const fall=1-dd/r*0.4; applyDamage(e,dmg*fall,twr,false);
      if(opts&&opts.slow){ e.slowT=Math.max(e.slowT,opts.slowDur); e.slowAmt=opts.slow; }
      if(opts&&opts.dot){ e.dots.push({dps:opts.dot,t:opts.dotDur}); } } }
}
function killEnemy(e){
  if(e.dead) return; e.dead=true;
  G.parts += e.reward;
  // コンボ＆スコア
  G.combo++; G.comboT=2.2; G.kills=(G.kills||0)+1; if(G.combo>(G.maxCombo||0)) G.maxCombo=G.combo;
  G.score += Math.round(e.reward*(1+G.combo*0.1)) + (e.boss?500:0);
  if(G.combo>=3 && G.combo%2===1) G.floats.push({x:e.x,y:e.y-e.size-16,txt:G.combo+' れんげき！',t:0,crit:true});
  // 撃破アナウンサー（コンボの節目）
  const AN={10:'撃 滅',20:'蹂 躙',30:'無 双',50:'殲 滅',75:'伝 説',100:'神 域'};
  if(AN[G.combo]){ G.announce=AN[G.combo]; G.announceT=1.4; sfx.upgrade(); }
  G.floats.push({x:e.x,y:e.y-e.size,txt:'+'+e.reward,t:0,part:true});
  fxExplode(e.x,e.y,e.color,e.boss?1.8:1);
  if(e.boss){ sfx.bossDie(); G.shake=Math.max(G.shake,20); buzz([0,30,40,60]); G.hitStop=0.10; G.announce='撃 破'; G.announceT=1.6; }
  else { sfx.die(); buzz(8); G.hitStop=Math.max(G.hitStop,0.012); if(e.size>=36){ G.hitStop=Math.max(G.hitStop,0.05); G.shake=Math.max(G.shake,6); } }
}
// 敵が基地（最左）に到達＝侵攻成功
function enemyLeak(e){
  e.dead=true; G.baseHP-=e.leak; sfx.leak(); buzz(50); G.shake=Math.max(G.shake,8); fxRing(BASE.x,BASE.y,40,'#ff4040');
  G.floats.push({x:BASE.x,y:BASE.y-30,txt:'-'+e.leak,t:0,dmg:true});
  if(G.baseHP<=0){ G.baseHP=0; gameOver(); }
}

/* ============================================================================
   更新ループ
   ============================================================================ */
function update(dt){
  if(G.scene!=='playing') return;
  if(G.flowDirty){ buildFlow(); G.flowDirty=false; }   // 壁が変わった時だけ経路再計算
  // スポーン
  if(G.waveActive){
    if(G.spawnQueue.length>0){
      G.spawnTimer-=dt;
      if(G.spawnTimer<=0){ const it=G.spawnQueue.shift(); spawnEnemy(it); G.spawnTimer=it.gap; }
    } else if(G.enemies.length===0){
      // ウェーブクリア
      G.waveActive=false; G.betweenTimer=6; const cb=28+Math.round(G.wave*2.6); G.parts+=cb;
      toast('ウェーブ '+G.wave+' クリア！ +'+cb+'部品'); sfx.waveClear();
      if(G.wave>G.best){ G.best=G.wave; localStorage.setItem('isobe_best',G.best); }
      if(G.score>G.bestScore){ G.bestScore=G.score; localStorage.setItem('isobe_bestscore',G.bestScore); }
    }
  } else {
    G.betweenTimer-=dt;
    if(G.betweenTimer<=0){ startNextWave(false); }
  }
  // 敵（走査中に分裂児が末尾追加されても当フレームでは処理しない＝固定長インデックス）
  const _earr=G.enemies;
  for(let _i=0,_n=_earr.length; _i<_n; _i++){ const e=_earr[_i];
    if(e.dead) continue;
    if(e.hitFlash>0) e.hitFlash-=dt;
    // DoT
    if(e.dots.length){ for(const d of e.dots){ const dd=d.dps*dt; e.hp-=dd; d.t-=dt; }
      e.dots=e.dots.filter(d=>d.t>0); if(e.hp<=0){ killEnemy(e); continue; } }
    if(e.stunT>0){ e.stunT-=dt; continue; }   // スタン中は静止
    let sp=e.baseSpeed*(e.hasteMul||1);        // haste は乗算係数（baseSpeed破壊なし＝溶岩バフと非衝突）
    if(e.slowT>0){ e.slowT-=dt; sp*=(1-(e.slowAmt||0.4)); }
    // 目標方向：地上=フローフィールド / 飛行=基地へ直進（壁無視）
    let dirx, diry;
    if(e.domain==='air'){
      const dx=BASE.x-e.x, dy=BASE.y-e.y, m=Math.hypot(dx,dy)||1; dirx=dx/m; diry=dy/m;
      e.prog=m/CELL;
      if(m<28){ enemyLeak(e); continue; }
    } else {
      let gx=Math.max(0,Math.min(WCOLS-1,Math.floor((e.x-OX)/CELL)));
      let gy=Math.max(0,Math.min(ROWS-1,Math.floor((e.y-OY)/CELL)));
      const i=idxOf(gx,gy);
      e.prog = distF[i]>=0 ? distF[i] : 9999;
      if(gx<=GOAL_GX){ enemyLeak(e); continue; }       // 基地列到達＝侵攻成功
      let fx=flowDX[i], fy=flowDY[i];
      if(distF[i]<0 || (fx===0&&fy===0)){              // 壁内→最寄りの通行可セルへ押し出し
        let bestD=1e9; fx=-1; fy=0;
        const N=[[1,0],[-1,0],[0,1],[0,-1]];
        for(let k=0;k<4;k++){ const nx=gx+N[k][0], ny=gy+N[k][1];
          if(nx<0||ny<0||nx>=WCOLS||ny>=ROWS)continue; const j=idxOf(nx,ny);
          if(distF[j]>=0 && distF[j]<bestD){ bestD=distF[j]; fx=N[k][0]; fy=N[k][1]; } }
      }
      dirx=fx; diry=fy;
    }
    // ステアリング（滑らかに方向転換）
    const turn=Math.min(1, dt*9);
    e.vx += (dirx-e.vx)*turn; e.vy += (diry-e.vy)*turn;
    const vm=Math.hypot(e.vx,e.vy)||1;
    let nx=e.x+(e.vx/vm)*sp*dt, ny=e.y+(e.vy/vm)*sp*dt;
    if(e.domain!=='air'){   // 壁ずり：壁セルへは入らない（軸ごとに判定）
      const cellOcc=(px,py)=>{ const a=Math.floor((px-OX)/CELL), b=Math.floor((py-OY)/CELL);
        return a>=0&&b>=0&&a<WCOLS&&b<ROWS && occ[idxOf(a,b)]; };
      if(cellOcc(nx,ny)){
        if(!cellOcc(nx,e.y)) ny=e.y;
        else if(!cellOcc(e.x,ny)) nx=e.x;
        else { nx=e.x; ny=e.y; }
      }
    }
    ny=Math.max(OY+8, Math.min(OY+ROWS*CELL-8, ny));
    e.x=nx; e.y=ny; e.ang=Math.atan2(e.vy,e.vx);
    // 詰まり救済：基地への進捗(prog)が一定時間改善しない地上敵＝閉じ込め→侵攻成功扱いで除去（ウェーブ非クリアのデッドロック防止）
    if(e.domain!=='air'){
      if(e.bestProg==null || e.prog < e.bestProg-0.5){ e.bestProg=e.prog; e.noProgT=0; }
      else { e.noProgT=(e.noProgT||0)+dt; if(e.noProgT>5){ enemyLeak(e); } }
    }
  }
  G.enemies=G.enemies.filter(e=>!e.dead);
  // タワー
  for(const t of G.towers) towerLogic(t, dt);
  // 弾
  for(const s of G.shots){
    if(s.type==='bullet'){
      if(s.target && !s.target.dead){ s.tx=s.target.x; s.ty=s.target.y; }
      const dx=s.tx-s.x, dy=s.ty-s.y, d=Math.hypot(dx,dy);
      if(d<14){ if(s.target&&!s.target.dead) applyDamage(s.target,s.dmg,{def:{atkType:'bullet'}},false); s.dead=true; }
      else { s.x+=dx/d*s.spd*dt; s.y+=dy/d*s.spd*dt; }
    } else if(s.type==='shell'){
      s.t+=dt; const k=s.t/s.dur;
      if(k>=1){ s.dead=true;
        const opts={}; if(s.slow){opts.slow=s.slow;opts.slowDur=s.slowDur;} if(s.dot){opts.dot=s.dot;opts.dotDur=s.dotDur;}
        splashDamage(s.tx,s.ty,s.splash, s.dmg, s.poison?{def:{atkType:'poison',target:'ground'}}:null, opts);
        if(s.ice){ fxRing(s.tx,s.ty,s.splash,'#9fefff'); sfx.iceHit(); }
        else if(s.poison){ G.fx.push({type:'cloud',x:s.tx,y:s.ty,r:s.splash,life:0.8,color:'#bfff6a'}); }
        else { fxExplode(s.tx,s.ty,'#ffb050',1); sfx.explode(); }
      } else { s.x=s.sx+(s.tx-s.sx)*k; s.y=s.sy+(s.ty-s.sy)*k - Math.sin(k*Math.PI)*60; }
    } else if(s.type==='missile'){
      s.life-=dt; if(s.life<=0){s.dead=true;continue;}
      if(s.target && !s.target.dead){
        const desa=Math.atan2(s.target.y-s.y,s.target.x-s.x);
        let ca=Math.atan2(s.vy,s.vx); let da=desa-ca;
        while(da>Math.PI)da-=6.28; while(da<-Math.PI)da+=6.28;
        ca+=Math.max(-s.turn*dt,Math.min(s.turn*dt,da));
        s.vx=Math.cos(ca)*s.spd; s.vy=Math.sin(ca)*s.spd;
      }
      s.x+=s.vx*dt; s.y+=s.vy*dt;
      if(s.x%2<1) G.fx.push({type:'smoke',x:s.x,y:s.y,life:0.3});
      if(s.target && !s.target.dead && Math.hypot(s.target.x-s.x,s.target.y-s.y)<16){
        s.dead=true; splashDamage(s.x,s.y,s.splash,s.dmg,null,{}); fxExplode(s.x,s.y,'#9fbfff',1); sfx.explode();
      }
    }
  }
  G.shots=G.shots.filter(s=>!s.dead);
  // FX
  for(const f of G.fx){ f.life-=dt;
    if(f.type==='particle'){ f.x+=f.vx*dt; f.y+=f.vy*dt; f.vy+=300*dt; }
    else if(f.type==='scrap'){ f.x+=f.vx*dt; f.y+=f.vy*dt; f.vy+=470*dt; f.vx*=0.99; f.rot+=f.vr*dt; } }
  G.fx=G.fx.filter(f=>f.life>0);
  for(const f of G.floats){ f.t+=dt; f.y-=24*dt; }
  G.floats=G.floats.filter(f=>f.t<0.8);
  if(G.comboT>0){ G.comboT-=dt; if(G.comboT<=0) G.combo=0; }
}

/* ---------- エフェクト生成 ---------- */
function fxExplode(x,y,color,scale){
  for(let i=0;i<10*scale;i++){ const a=Math.random()*6.28,sp=60+Math.random()*180*scale;
    G.fx.push({type:'particle',x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.3+Math.random()*0.3,color,r:2+Math.random()*3*scale}); }
  // 機械片（スクラップ）が飛び散る＝メカが壊れた重み
  for(let i=0;i<4*scale;i++){ const a=Math.random()*6.28,sp=80+Math.random()*150*scale;
    G.fx.push({type:'scrap',x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-70,life:0.5+Math.random()*0.4,rot:Math.random()*6.28,vr:(Math.random()-0.5)*16,w:2+Math.random()*3*scale,col:shade(color,-35)}); }
  G.fx.push({type:'flash',x,y,r:20*scale,life:0.15,color});
  G.fx.push({type:'ring',x,y,r:6*scale,color:'#fff',life:0.18});   // 撃破の白い衝撃リング
  G.fx.push({type:'light',x,y,r:60*scale,life:0.28});   // 動的ライティング（周囲を照らす）
  if(scale>=1) G.fx.push({type:'scorch',x,y,r:13*scale,life:4.5});   // 焦げ跡が残留＝戦場が荒れていく
}
function fxRing(x,y,r,color){ G.fx.push({type:'ring',x,y,r,life:0.4,color}); }

/* ============================================================================
   描画：戦場（cvレイヤー）
   ============================================================================ */
let bgPattern=null;
function drawField(t){
  // 背景：奥行きグラデの大地（ワールド全幅）
  ctx.fillStyle='#10140c'; ctx.fillRect(-16,-16,WORLD_W+32,H+32);
  const bg=ctx.createLinearGradient(0,OY,0,OY+ROWS*CELL);
  bg.addColorStop(0,'#252b1a'); bg.addColorStop(0.55,'#1a2014'); bg.addColorStop(1,'#10140c');
  ctx.fillStyle=bg; ctx.fillRect(-16,OY-16,WORLD_W+32,ROWS*CELL+32);
  // 地面テクスチャ（陰影つき市松）
  for(let gy=0;gy<ROWS;gy++)for(let gx=0;gx<WCOLS;gx++){
    const x=OX+gx*CELL,y=OY+gy*CELL;
    ctx.fillStyle=((gx+gy)&1)?'#252d1a':'#1a2212'; ctx.fillRect(x,y,CELL,CELL);
    ctx.fillStyle='rgba(255,255,255,0.025)'; ctx.fillRect(x,y,CELL,1);
    ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.fillRect(x,y+CELL-1,CELL,1);
  }
  // 戦場の汚し（不定形・サイズばらつき）
  ctx.fillStyle='rgba(35,26,10,0.5)';
  for(let i=0;i<80;i++){ const x=OX+((i*137)%WORLD_W), y=OY+((i*173)%(ROWS*CELL));
    ctx.globalAlpha=0.10+(i%5)*0.03; ctx.beginPath(); ctx.ellipse(x,y,10+(i*7%14),5+(i*3%8),(i*0.7),0,7); ctx.fill(); }
  ctx.globalAlpha=1;
  if(typeof eraOverlay==='function') eraOverlay(t);   // ERA 戦域変容（背景層）
  // 敵の出現口（右中央の1マス）を可視化
  { const sc=cellCenter(SPAWN_GX,SPAWN_GY);
    ctx.save(); ctx.translate(sc.x,sc.y);
    ctx.strokeStyle='rgba(220,70,70,'+(0.5+0.3*Math.sin(t*5))+')'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(0,0,CELL*0.5,0,7); ctx.stroke();
    ctx.fillStyle='rgba(180,30,30,0.25)'; ctx.beginPath(); ctx.arc(0,0,CELL*0.42,0,7); ctx.fill();
    ctx.fillStyle='#ffb0b0'; ctx.font='bold 9px system-ui'; ctx.textAlign='center'; ctx.fillText('敵',0,3);
    ctx.restore(); }

  // 迷路の現在経路を流れ場の矢印で可視化（自作した“道”が見える）
  ctx.fillStyle='rgba(120,180,255,0.16)';
  for(let gy=0;gy<ROWS;gy++)for(let gx=1;gx<WCOLS-1;gx++){
    const i=idxOf(gx,gy); if(distF[i]<0) continue; const fx=flowDX[i], fy=flowDY[i]; if(fx===0&&fy===0) continue;
    const cx=OX+gx*CELL+CELL/2, cy=OY+gy*CELL+CELL/2;
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(Math.atan2(fy,fx));
    ctx.beginPath(); ctx.moveTo(8,0); ctx.lineTo(-5,-5); ctx.lineTo(-5,5); ctx.closePath(); ctx.fill(); ctx.restore();
  }

  // 基地（磯部軍）
  drawBase(t);

  // 配置可能セルのハイライト（配置モード時）— 緑=置ける/赤=道を塞ぐ
  if(G.selectedPalette){
    const bs=blockSet();
    for(let gy=0;gy<ROWS;gy++)for(let gx=0;gx<WCOLS;gx++){
      if(!cellFree(gx,gy)) continue; const x=OX+gx*CELL,y=OY+gy*CELL;
      if(bs.has(gx+','+gy)){ ctx.fillStyle='rgba(220,60,60,0.16)'; ctx.fillRect(x+2,y+2,CELL-4,CELL-4); }
      else { ctx.fillStyle='rgba(120,255,150,0.10)'; ctx.fillRect(x+2,y+2,CELL-4,CELL-4); } }
    if(G.hoverCell){ const {gx,gy}=G.hoverCell; const c=cellCenter(gx,gy);
      const def=TOWER_BY_KEY[G.selectedPalette]; const ok=cellFree(gx,gy)&&!bs.has(gx+','+gy)&&G.parts>=def.cost;
      // 射程プレビュー
      ctx.beginPath(); ctx.arc(c.x,c.y,lvlStat(def,1).range,0,7);
      ctx.fillStyle=ok?'rgba(120,200,255,0.12)':'rgba(255,80,80,0.12)';
      ctx.fill(); ctx.strokeStyle=ok?'rgba(120,200,255,0.6)':'rgba(255,80,80,0.6)'; ctx.lineWidth=2; ctx.stroke();
      ctx.fillStyle=ok?'rgba(120,255,150,0.3)':'rgba(255,80,80,0.3)';
      ctx.fillRect(OX+gx*CELL+2,OY+gy*CELL+2,CELL-4,CELL-4);
    }
    // 指の上に浮かぶゴースト砲塔（タッチ配置中・指で隠れたマスを見せる）
    if(G.placeGhost){ const g=G.placeGhost; const def=TOWER_BY_KEY[G.selectedPalette];
      const ghostOk = G.hoverCell && cellFree(G.hoverCell.gx,G.hoverCell.gy) && !bs.has(G.hoverCell.gx+','+G.hoverCell.gy) && G.parts>=def.cost;
      ctx.save(); ctx.globalAlpha=0.85;
      // 接地点→ゴーストへの連結ライン
      ctx.strokeStyle=ghostOk?'rgba(120,255,150,0.5)':'rgba(255,120,120,0.5)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(g.x,g.y+LIFT_PX); ctx.lineTo(g.x,g.y); ctx.stroke();
      // 砲塔アイコン（円＋種別色＋頭文字）
      ctx.beginPath(); ctx.arc(g.x,g.y,CELL*0.42,0,7);
      ctx.fillStyle=ghostOk?'rgba(20,40,30,0.85)':'rgba(50,20,20,0.85)'; ctx.fill();
      ctx.strokeStyle=def.acc||'#8cf'; ctx.lineWidth=2.5; ctx.stroke();
      ctx.fillStyle=def.acc||'#fff'; ctx.font='bold 18px system-ui'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText((def.cat||def.key||'?').slice(0,1), g.x, g.y);
      ctx.restore(); ctx.textBaseline='alphabetic';
    }
  }
  // 選択タワーの射程
  if(G.selectedTower){ const tw=G.selectedTower; const st=lvlStat(tw.def,tw.lv);
    ctx.beginPath(); ctx.arc(tw.x,tw.y,st.range,0,7);
    ctx.fillStyle='rgba(255,255,255,0.06)'; ctx.fill();
    ctx.strokeStyle=tw.def.acc; ctx.lineWidth=2; ctx.setLineDash([6,6]); ctx.stroke(); ctx.setLineDash([]);
  }

  // タワー（奥→手前）
  const sorted=[...G.towers].sort((a,b)=>a.y-b.y);
  for(const tw of sorted) drawTower(tw,t);

  // 敵
  for(const e of G.enemies) drawEnemy(e,t);

  // 弾・FX
  drawShots(); drawFX();
  // ダメージ表示（袋文字＋ポップインで読みやすく・ヒット感UP）
  for(const f of G.floats){
    ctx.globalAlpha=1-f.t/0.8;
    const pk=Math.min(1,f.t/0.07), base=f.crit?22:16, sz=base*(0.6+0.4*pk);
    ctx.font='bold '+sz.toFixed(0)+'px system-ui'; ctx.textAlign='center';
    ctx.lineWidth=3; ctx.strokeStyle='rgba(0,0,0,0.85)'; ctx.strokeText(f.txt,f.x,f.y);
    if(f.crit){ ctx.shadowColor='#ffd23f'; ctx.shadowBlur=8; }
    ctx.fillStyle=f.part?'#7fff9f':f.dmg?'#ff7070':f.shield?'#7fcfff':f.crit?'#ffe23f':'#fff';
    ctx.fillText(f.txt,f.x,f.y); ctx.shadowBlur=0;
    ctx.globalAlpha=1;
  }
}

function drawBase(t){
  const x=BASE.x, y=BASE.y, hpr=G.baseHP/G.baseMax;
  ctx.save(); ctx.translate(x,y);
  // 影
  ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.beginPath(); ctx.ellipse(0,34,34,10,0,0,7); ctx.fill();
  // 装甲（グラデ＋ハイライト）
  const g=ctx.createLinearGradient(0,-36,0,36); g.addColorStop(0,'#43536a'); g.addColorStop(0.5,'#2a3a4c'); g.addColorStop(1,'#161f2a');
  ctx.fillStyle=g; ctx.fillRect(-30,-34,60,68);
  ctx.fillStyle='#5a7494'; ctx.fillRect(-30,-34,60,4);
  ctx.fillStyle='#3a5a7a'; ctx.fillRect(-30,-30,60,8);
  // パネルライン＋リベット
  ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=1; ctx.strokeRect(-26,-18,52,48);
  ctx.fillStyle='#5a6a80'; for(let i=-1;i<=1;i++){ ctx.beginPath(); ctx.arc(-22,i*16,1.6,0,7); ctx.arc(22,i*16,1.6,0,7); ctx.fill(); }
  // 稼働コア（青い脈動グロー）
  ctx.save(); ctx.globalCompositeOperation='lighter'; const pa=0.5+0.5*Math.sin(t*3);
  ctx.fillStyle='rgba(90,170,255,'+(0.25+0.3*pa)+')'; ctx.beginPath(); ctx.arc(0,4,9,0,7); ctx.fill(); ctx.restore();
  ctx.fillStyle='#0e1a28'; ctx.fillRect(-7,-3,14,14);
  // 砲門（左向き）
  ctx.fillStyle='#1a2a3a'; ctx.fillRect(-36,-7,16,14); ctx.fillStyle='#0a141e'; ctx.fillRect(-38,-4,6,8);
  // 旗（布が波打つ）
  ctx.fillStyle='#7a828c'; ctx.fillRect(-2,-62,3,30);
  for(let i=0;i<7;i++){ const wy=Math.sin(t*3+i*0.6)*2.2; ctx.fillStyle=i%2?'#4a9aff':'#3a86e6'; ctx.fillRect(1+i*3,-62+wy,3,13); }
  ctx.fillStyle='#fff'; ctx.font='bold 10px system-ui'; ctx.textAlign='center'; ctx.fillText('磯',11,-51);
  // 段階損傷
  if(hpr<0.6){ ctx.strokeStyle='rgba(0,0,0,0.7)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(-18,-14); ctx.lineTo(-4,2); ctx.lineTo(-10,18); ctx.moveTo(10,-8); ctx.lineTo(20,8); ctx.stroke(); }
  if(hpr<0.3){ ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.fillStyle='rgba(255,120,40,'+(0.3+0.3*Math.sin(t*9))+')'; ctx.beginPath(); ctx.arc(0,0,22,0,7); ctx.fill(); ctx.restore();
    if(Math.random()<0.4) G.fx.push({type:'smoke',x:x+(Math.random()-0.5)*30,y:y-18,life:0.4}); }
  ctx.restore();
}

function drawEnemy(e,t){
  const air = e.domain==='air';
  ctx.save();
  ctx.translate(e.x, air? e.y-26 : e.y);
  // 影
  ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.beginPath();
  ctx.ellipse(0, air?30:e.size*0.5, e.size*0.5, e.size*0.18, 0,0,7); ctx.fill();
  // 向き：左進行が基本。地上歩兵は左右反転、車両/空は角度
  const vehicle = ['bike','tank','jet','blimp','drone','spider','mech','boss'].includes(e.arch);
  if(vehicle && (e.arch==='jet'||e.arch==='bike'||e.arch==='tank')){ ctx.rotate(e.ang); }
  else { ctx.scale(Math.cos(e.ang)<0?1:-1,1); }
  // 被弾は『四角フラッシュ』ではなく、一瞬の拡大パンチ＋白い衝撃リングで（敵を隠さない）
  const fn=ARCH[e.arch]||ARCH.soldier;
  ctx.save();
  if(e.hitFlash>0){ const k=1+e.hitFlash*1.4; ctx.scale(k,k); }
  fn(ctx, e, t);
  ctx.restore();
  if(e.hitFlash>0){ ctx.strokeStyle='rgba(255,255,255,'+(e.hitFlash/0.12*0.85)+')'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(0,0,e.size*0.62,0,7); ctx.stroke(); }
  // スロウ/毒/スタンの色
  if(e.stunT>0){ ctx.strokeStyle='#7fffff'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,e.size*0.7,0,7); ctx.stroke(); }
  ctx.restore();
  // HPバー
  const air2 = air? e.y-26 : e.y;
  const w=e.size*1.4, hp=Math.max(0,e.hp/e.maxhp);
  ctx.fillStyle='rgba(10,0,0,0.78)'; ctx.fillRect(e.x-w/2-1, air2-e.size*0.95-7, w+2, 6);
  ctx.fillStyle=e.boss?'#ff3b6b':hp>0.5?'#46e056':hp>0.25?'#e0d24a':'#e0563a';
  ctx.fillRect(e.x-w/2, air2-e.size*0.95-6, w*hp, 4);
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1; ctx.strokeRect(e.x-w/2-1, air2-e.size*0.95-7, w+2, 6);
  if(e.slowT>0){ ctx.fillStyle='#7fdfff'; ctx.fillRect(e.x-w/2, air2-e.size*0.95-2, w*0.4,2); }
  if(e.dots.length){ ctx.fillStyle='#bfff6a'; ctx.fillRect(e.x+w*0.1, air2-e.size*0.95-2, w*0.4,2); }
}

function drawTower(tw,t){
  const def=tw.def, st=lvlStat(def,tw.lv);
  ctx.save(); ctx.translate(tw.x,tw.y);
  const _sp=(tw.spawnT==null?1:tw.spawnT); if(_sp<1) ctx.scale(1+Math.sin(Math.min(1,_sp)*Math.PI)*0.3, 1+Math.sin(Math.min(1,_sp)*Math.PI)*0.3);   // 設置ポップ
  if(tw.upFlash>0){ ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=tw.upFlash/0.4;
    ctx.strokeStyle='#ffe070'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,2,26,0,7); ctx.stroke(); ctx.restore(); }
  // Lv5 覚醒オーラ（金色の脈動＋周回する光粒）
  if(tw.lv>=5){ const pa=0.5+0.5*Math.sin(t*4+tw.gx);
    ctx.save(); ctx.globalCompositeOperation='lighter';
    const g=ctx.createRadialGradient(0,4,2,0,4,32);
    g.addColorStop(0,'rgba(255,220,120,'+(0.30*pa)+')'); g.addColorStop(1,'rgba(255,180,40,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,4,32,0,7); ctx.fill(); ctx.restore();
    ctx.strokeStyle='rgba(255,225,130,'+(0.5+0.4*pa)+')'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,6,25,0,7); ctx.stroke();
    for(let i=0;i<3;i++){ const a=t*2+i*2.094; ctx.fillStyle='rgba(255,238,170,0.95)';
      ctx.beginPath(); ctx.arc(Math.cos(a)*25, 6+Math.sin(a)*9, 2.2, 0,7); ctx.fill(); } }
  // 味方フットプリント（青）＝敵と一目で区別
  ctx.fillStyle='rgba(90,150,255,0.12)'; ctx.beginPath(); ctx.arc(0,12,24,0,7); ctx.fill();
  // 影
  ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.beginPath(); ctx.ellipse(0,16,22,8,0,0,7); ctx.fill();
  // 土台
  ctx.fillStyle='#33373f'; ctx.fillRect(-20,2,40,18);
  ctx.fillStyle='#44485a'; ctx.fillRect(-20,2,40,5);
  // 砲塔（種別で形状）
  ctx.save(); ctx.translate(0,-2);
  const recoil = tw.recoil>0? tw.recoil*4:0;
  ctx.rotate(tw.ang+ (Math.cos(tw.ang)<0?Math.PI:0)); // 左向き基準で見栄え
  ctx.rotate(-(tw.ang+ (Math.cos(tw.ang)<0?Math.PI:0))); // （実際は下のtypeごとに角度適用）
  ctx.restore();

  // 砲身は target 方向へ
  ctx.save(); ctx.translate(0,-4); ctx.rotate(tw.ang);
  drawTurret(def, tw, recoil, t);
  ctx.restore();

  // 対象タイプのリング（陸=琥珀／空=青／両=紫）で一目区別
  ctx.save(); ctx.globalAlpha=0.7; ctx.strokeStyle=targetColor(def.target); ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.arc(0,10,21,0,7); ctx.stroke(); ctx.restore();
  // レベル表示（星）
  ctx.fillStyle=def.acc; ctx.font='bold 9px system-ui'; ctx.textAlign='center';
  let stars=''; for(let i=0;i<tw.lv;i++)stars+='★';
  ctx.fillText(stars, 0, 30);
  // 強化可能インジケータ
  if(tw.lv<5 && G.parts>=upCost(def,tw.lv)){
    const pulse=0.5+0.5*Math.sin(t*6);
    ctx.fillStyle='rgba(127,255,160,'+(0.5+pulse*0.5)+')';
    ctx.beginPath(); ctx.moveTo(0,-30); ctx.lineTo(-7,-22); ctx.lineTo(7,-22); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#0a3'; ctx.font='bold 10px system-ui'; ctx.fillText('▲',0,-22);
  }
  ctx.restore();
}
function drawTurret(def, tw, recoil, t){
  const c=def.color, a=def.acc;
  ctx.fillStyle=c;
  switch(def.atkType){
    case 'bullet':
      ctx.fillStyle=shade(c,-10); ctx.beginPath(); ctx.arc(0,0,11,0,7); ctx.fill();
      ctx.fillStyle=c; ctx.fillRect(0-recoil,-3,20,6);
      ctx.fillStyle=a; ctx.fillRect(16-recoil,-2,4,4);
      if(tw.fireFx>0){ ctx.fillStyle='rgba(255,240,160,'+(tw.fireFx/0.12)+')'; ctx.beginPath(); ctx.arc(20-recoil,0,6,0,7); ctx.fill(); }
      break;
    case 'shell': case 'rail':
      ctx.fillStyle=shade(c,-10); ctx.fillRect(-10,-8,20,16);
      ctx.fillStyle=c; ctx.fillRect(0-recoil*2,-4,26,8);
      ctx.fillStyle=a; ctx.fillRect(22-recoil*2,-3,5,6);
      if(tw.fireFx>0){ ctx.fillStyle='rgba(255,220,120,'+(tw.fireFx/0.12)+')'; ctx.beginPath(); ctx.arc(28,0,9,0,7); ctx.fill(); }
      break;
    case 'missile':
      ctx.fillStyle=shade(c,-10); ctx.fillRect(-9,-9,18,18);
      ctx.fillStyle=a; ctx.fillRect(2,-7,6,5); ctx.fillRect(2,2,6,5);
      break;
    case 'beam':
      ctx.fillStyle=shade(c,-10); ctx.beginPath(); ctx.arc(0,0,10,0,7); ctx.fill();
      ctx.fillStyle=c; ctx.fillRect(0,-3,22,6);
      ctx.fillStyle=a; ctx.beginPath(); ctx.arc(22,0,4,0,7); ctx.fill();
      break;
    case 'flame':
      ctx.fillStyle=shade(c,-10); ctx.fillRect(-8,-7,16,14);
      ctx.fillStyle=c; ctx.fillRect(0,-5,18,10);
      ctx.fillStyle='#511'; ctx.fillRect(15,-4,6,8);
      break;
    case 'ice': case 'poison':
      ctx.fillStyle=shade(c,-10); ctx.beginPath(); ctx.arc(0,0,11,0,7); ctx.fill();
      ctx.fillStyle=c; ctx.fillRect(0-recoil,-4,20,8);
      ctx.fillStyle=a; ctx.beginPath(); ctx.arc(20-recoil,0,5,0,7); ctx.fill();
      break;
    case 'chain':
      ctx.fillStyle=shade(c,-10); ctx.beginPath(); ctx.arc(0,0,10,0,7); ctx.fill();
      ctx.strokeStyle=a; ctx.lineWidth=2;
      for(let i=0;i<3;i++){ ctx.beginPath(); ctx.arc(0,0,6+i*3,-1,1); ctx.stroke(); }
      ctx.fillStyle=a; ctx.fillRect(0,-2,18,4);
      // 放電
      if(Math.random()<0.3){ ctx.strokeStyle='rgba(255,240,120,0.7)'; ctx.beginPath();
        ctx.moveTo(0,-12); ctx.lineTo((Math.random()-0.5)*16,-20); ctx.stroke(); }
      break;
    case 'barrier':
      ctx.fillStyle=shade(c,-10); ctx.beginPath(); ctx.arc(0,0,12,0,7); ctx.fill();
      ctx.strokeStyle=a; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,8+2*Math.sin(t*4),0,7); ctx.stroke();
      ctx.fillStyle=a; ctx.beginPath(); ctx.arc(0,0,4,0,7); ctx.fill();
      break;
    case 'buff':
      ctx.fillStyle=shade(c,-10); ctx.beginPath(); ctx.arc(0,0,11,0,7); ctx.fill();
      ctx.fillStyle=a; ctx.font='bold 14px system-ui'; ctx.textAlign='center'; ctx.fillText('↑',0,5);
      ctx.strokeStyle='rgba(255,206,122,0.4)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(0,0,10+3*Math.sin(t*3),0,7); ctx.stroke();
      break;
  }
}

function drawShots(){
  for(const s of G.shots){
    // 加算合成のグロー＋白コア（高精細スプライトに馴染む発光弾）
    ctx.save(); ctx.globalCompositeOperation='lighter';
    if(s.type==='bullet'){
      const a=Math.atan2(s.ty-s.y,s.tx-s.x);
      ctx.strokeStyle=s.color; ctx.globalAlpha=0.5; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(s.x-Math.cos(a)*10,s.y-Math.sin(a)*10); ctx.stroke();
      ctx.globalAlpha=0.55; ctx.fillStyle=s.color; ctx.beginPath(); ctx.arc(s.x,s.y,5,0,7); ctx.fill();
      ctx.globalAlpha=1; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(s.x,s.y,2,0,7); ctx.fill();
    } else if(s.type==='shell'){
      ctx.globalAlpha=0.5; ctx.fillStyle=s.color; ctx.beginPath(); ctx.arc(s.x,s.y,7,0,7); ctx.fill();
      ctx.globalAlpha=1; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(s.x,s.y,3,0,7); ctx.fill();
    } else if(s.type==='missile'){ ctx.translate(s.x,s.y); ctx.rotate(Math.atan2(s.vy,s.vx));
      ctx.globalAlpha=0.6; ctx.fillStyle='#ffb060'; ctx.beginPath(); ctx.arc(-9,0,4,0,7); ctx.fill();
      ctx.globalAlpha=1; ctx.fillStyle=s.color; ctx.fillRect(-6,-2,12,4); ctx.fillStyle='#fff'; ctx.fillRect(3,-1.5,4,3);
    }
    ctx.restore();
  }
}
function drawFX(){
  for(const f of G.fx){
    const al=Math.max(0,f.life);
    if(f.type==='light'){ const k=al/0.28; ctx.save(); ctx.globalCompositeOperation='lighter';
      const g=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r);
      g.addColorStop(0,'rgba(255,210,140,'+(0.5*k)+')'); g.addColorStop(0.5,'rgba(255,140,60,'+(0.18*k)+')'); g.addColorStop(1,'rgba(255,120,40,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,7); ctx.fill(); ctx.restore(); }
    else if(f.type==='scorch'){ ctx.save(); ctx.globalAlpha=Math.min(0.34,Math.max(0,f.life)/4.5*0.34); ctx.fillStyle='#0e0905';
      ctx.beginPath(); ctx.ellipse(f.x,f.y,f.r,f.r*0.5,0,0,7); ctx.fill(); ctx.restore(); }
    else if(f.type==='scrap'){ ctx.save(); ctx.globalAlpha=Math.min(1,Math.max(0,f.life)*2.2); ctx.translate(f.x,f.y); ctx.rotate(f.rot); ctx.fillStyle=f.col;
      ctx.fillRect(-f.w/2,-f.w*0.25,f.w,f.w*0.5); ctx.restore(); ctx.globalAlpha=1; }
    else if(f.type==='particle'){ ctx.globalAlpha=al*2.5; ctx.fillStyle=f.color; ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,7); ctx.fill(); ctx.globalAlpha=1; }
    else if(f.type==='flash'){ ctx.globalAlpha=al/0.15; ctx.fillStyle=f.color; ctx.beginPath(); ctx.arc(f.x,f.y,f.r*(1.4-al/0.15*0.4),0,7); ctx.fill(); ctx.globalAlpha=1; }
    else if(f.type==='ring'){ ctx.globalAlpha=al/0.4; ctx.strokeStyle=f.color; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(f.x,f.y,f.r*(1-al/0.4)+8,0,7); ctx.stroke(); ctx.globalAlpha=1; }
    else if(f.type==='beam'){ ctx.globalAlpha=al/0.1; ctx.strokeStyle=f.color; ctx.lineWidth=f.w||2; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(f.x1,f.y1); ctx.lineTo(f.x2,f.y2); ctx.stroke(); ctx.globalAlpha=1; }
    else if(f.type==='chain'){ ctx.globalAlpha=al/0.14; ctx.strokeStyle=f.color; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(f.x1,f.y1);
      const seg=4; for(let i=1;i<seg;i++){ const tt=i/seg; ctx.lineTo(f.x1+(f.x2-f.x1)*tt+(Math.random()-0.5)*10, f.y1+(f.y2-f.y1)*tt+(Math.random()-0.5)*10); }
      ctx.lineTo(f.x2,f.y2); ctx.stroke(); ctx.globalAlpha=1; }
    else if(f.type==='rail'){ ctx.globalAlpha=al/0.2; ctx.strokeStyle=f.color; ctx.lineWidth=4; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(f.x1,f.y1); ctx.lineTo(f.x2,f.y2); ctx.stroke();
      ctx.globalAlpha=al/0.2*0.4; ctx.lineWidth=10; ctx.stroke(); ctx.globalAlpha=1; }
    else if(f.type==='flame'){ ctx.save(); ctx.globalAlpha=al/0.12*0.8; ctx.translate(f.x,f.y); ctx.rotate(f.ang);
      const grd=ctx.createLinearGradient(0,0,f.range,0); grd.addColorStop(0,'#ffec80'); grd.addColorStop(0.5,'#ff8030'); grd.addColorStop(1,'rgba(200,40,0,0)');
      ctx.fillStyle=grd; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(f.range,-f.range*0.35); ctx.lineTo(f.range,f.range*0.35); ctx.closePath(); ctx.fill(); ctx.restore(); ctx.globalAlpha=1; }
    else if(f.type==='cloud'){ ctx.globalAlpha=al/0.8*0.5; ctx.fillStyle=f.color; ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,7); ctx.fill(); ctx.globalAlpha=1; }
    else if(f.type==='smoke'){ ctx.globalAlpha=al/0.3*0.4; ctx.fillStyle='#aaa'; ctx.beginPath(); ctx.arc(f.x,f.y,4,0,7); ctx.fill(); ctx.globalAlpha=1; }
  }
}

/* ============================================================================
   描画：UI（uiレイヤー）
   ============================================================================ */
const palBtns=[]; // クリック領域
function drawUI(t){
  uctx.clearRect(0,0,W,H);
  if(G.scene==='title'){ drawTitle(t); return; }
  // 画面ビネット（四隅を締めて奥行きを出す）
  const vg=uctx.createRadialGradient(W/2,H/2,H*0.34,W/2,H/2,W*0.62);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.4)');
  uctx.fillStyle=vg; uctx.fillRect(0,0,W,H);
  // 上HUD（細・大きめ文字）
  uctx.fillStyle='#0c1018'; uctx.fillRect(0,0,W,HUD_H);

  // 基地HP（バー内に数値・滑らかに減る）

let palScroll=0, palMax=0;
// 下の兵器バー（横スクロール）＋右端に「つぎのウェーブ」
let BAR_Y = H - BAR_H;   // 折りたたみで可変（drawUIで更新）
const BAR_LEFT = 10, BAR_RIGHT = W - 170;   // カードのスクロール域（右下の「つぎへ」FABを避ける）
const CARDW = 100, CARDGAP = 8;
function drawBottomBar(t){
  const yo = (1-(G.barAnim==null?1:G.barAnim))*BAR_H;   // 下からスライドイン
  const top = BAR_Y + yo;
  uctx.fillStyle='#0a0e15'; uctx.fillRect(0,top,W,BAR_H+yo);
  uctx.fillStyle='#3a7a5a'; uctx.fillRect(0,top,W,2);
  palBtns.length=0;
  const cardY = top+12, cardH = BAR_H-24;
  const viewW = BAR_RIGHT - BAR_LEFT;
  palMax = Math.max(0, TOWER_DEFS.length*(CARDW+CARDGAP) - viewW);
  palScroll = Math.max(0, Math.min(palScroll, palMax));
  uctx.save();
  uctx.beginPath(); uctx.rect(BAR_LEFT-2, top, viewW+4, BAR_H); uctx.clip();
  for(let i=0;i<TOWER_DEFS.length;i++){
    const def=TOWER_DEFS[i];
    const x = BAR_LEFT + i*(CARDW+CARDGAP) - palScroll;
    if(x>BAR_RIGHT || x+CARDW<BAR_LEFT){ palBtns.push(null); continue; }
    const sel=G.selectedPalette===def.key, afford=G.parts>=def.cost;
    uctx.fillStyle=sel?'#27506e':'#161c26'; uctx.fillRect(x,cardY,CARDW,cardH);
    uctx.strokeStyle=sel?def.acc:'#2a3340'; uctx.lineWidth=sel?2:1; uctx.strokeRect(x,cardY,CARDW,cardH);
    uctx.fillStyle=targetColor(def.target); uctx.fillRect(x,cardY,28,17);
    uctx.fillStyle='#06121f'; uctx.font='bold 12px system-ui'; uctx.textAlign='center'; uctx.fillText(targetLabel(def.target),x+14,cardY+13);
    uctx.save(); uctx.translate(x+CARDW/2, cardY+31); drawTurretIcon(def); uctx.restore();
    uctx.textAlign='center'; uctx.font='bold 12px system-ui'; uctx.fillStyle=afford?'#fff':'#7a8190';
    uctx.fillText(def.name.replace('磯部',''), x+CARDW/2, cardY+55);
    uctx.font='10px system-ui'; uctx.fillStyle=def.acc; uctx.fillText(def.cat, x+CARDW/2, cardY+69);
    uctx.font='bold 15px system-ui'; uctx.fillStyle=afford?'#ffd23f':'#a86'; uctx.fillText('⚙'+def.cost, x+CARDW/2, cardY+cardH-6);
    palBtns.push({x,y:cardY,w:CARDW,h:cardH,key:def.key});
  }
  uctx.restore();
  if(palScroll>2){ uctx.fillStyle='rgba(120,200,255,0.9)'; uctx.font='24px system-ui'; uctx.textAlign='center'; uctx.fillText('‹',BAR_LEFT+2,top+BAR_H/2+8); }
  if(palScroll<palMax-2){ uctx.fillStyle='rgba(120,200,255,0.9)'; uctx.font='24px system-ui'; uctx.textAlign='center'; uctx.fillText('›',BAR_RIGHT-2,top+BAR_H/2+8); }
}
function drawTurretIcon(def){
  const c=def.color,a=def.acc;
  uctx.fillStyle='#2a3038'; uctx.beginPath(); uctx.arc(0,0,16,0,7); uctx.fill();
  uctx.fillStyle=c; uctx.beginPath(); uctx.arc(0,0,11,0,7); uctx.fill();
  uctx.fillStyle=a;
  switch(def.atkType){
    case 'bullet': uctx.fillRect(0,-3,16,6); break;
    case 'shell': case 'rail': uctx.fillRect(0,-4,18,8); break;
    case 'missile': uctx.fillRect(2,-6,5,4); uctx.fillRect(2,2,5,4); break;
    case 'beam': uctx.fillRect(0,-2,18,4); break;
    case 'flame': uctx.beginPath(); uctx.moveTo(8,-6); uctx.lineTo(18,0); uctx.lineTo(8,6); uctx.fill(); break;
    case 'ice': uctx.fillStyle=a; for(let i=0;i<6;i++){uctx.save();uctx.rotate(i*1.05);uctx.fillRect(0,-1,12,2);uctx.restore();} break;
    case 'poison': uctx.beginPath(); uctx.arc(8,0,5,0,7); uctx.fill(); break;
    case 'chain': uctx.font='bold 16px system-ui'; uctx.textAlign='center'; uctx.fillText('⚡',0,5); break;
    case 'barrier': uctx.lineWidth=2; uctx.strokeStyle=a; uctx.beginPath(); uctx.arc(0,0,8,0,7); uctx.stroke(); break;
    case 'buff': uctx.font='bold 16px system-ui'; uctx.textAlign='center'; uctx.fillText('↑',0,6); break;
  }
}

function roundChip(x,y,w,h){ const r=h/2; uctx.beginPath(); uctx.moveTo(x+r,y);
  uctx.arcTo(x+w,y,x+w,y+h,r); uctx.arcTo(x+w,y+h,x,y+h,r); uctx.arcTo(x,y+h,x,y,r); uctx.arcTo(x,y,x+w,y,r); uctx.closePath(); uctx.fill(); }
function targetColor(t){ return t==='ground'?'#caa84a':t==='air'?'#5aa0ff':'#b97fff'; }
function targetLabel(t){ return t==='ground'?'陸':t==='air'?'空':'両'; }
// 選択したタワーのすぐ横に出る操作パネル（親指リーチ改善）
function drawTowerPanel(tw){
  const def=tw.def, st=lvlStat(def,tw.lv);
  const pw=248, ph=226;
  const sx=tw.x-G.camX, sy=tw.y;            // タワーのscreen座標（パネルはcamX非適用層）
  let px=sx+34, py=sy-ph/2;
  px=Math.min(px, W-pw-6); px=Math.max(px, 6);
  py=Math.min(py, BAR_Y-ph-4); py=Math.max(py, HUD_H+4);
  // タワーとパネルを結ぶ線
  uctx.globalAlpha=0.45; uctx.strokeStyle=def.acc; uctx.lineWidth=2;
  uctx.beginPath(); uctx.moveTo(sx,sy); uctx.lineTo(px<sx?px+pw:px, py+ph/2); uctx.stroke(); uctx.globalAlpha=1;
  // 枠
  uctx.fillStyle='rgba(8,12,20,0.96)'; uctx.fillRect(px,py,pw,ph);
  uctx.strokeStyle=def.acc; uctx.lineWidth=2; uctx.strokeRect(px,py,pw,ph);
  // アイコン＋名前
  uctx.save(); uctx.translate(px+24,py+26); drawTurretIcon(def); uctx.restore();
  uctx.textAlign='left'; uctx.fillStyle='#fff'; uctx.font='bold 15px system-ui'; uctx.fillText(def.name.replace('磯部',''),px+46,py+22);
  uctx.fillStyle=def.acc; uctx.font='11px system-ui'; uctx.fillText(def.cat,px+46,py+38);
  // 対象チップ
  const tgc=targetColor(def.target);
  uctx.fillStyle=tgc; roundChip(px+pw-54,py+10,44,20);
  uctx.fillStyle='#06121f'; uctx.font='bold 12px system-ui'; uctx.textAlign='center'; uctx.fillText(targetLabel(def.target)+'用',px+pw-32,py+24);
  // レベル
  uctx.textAlign='left'; uctx.fillStyle='#ffd23f'; uctx.font='13px system-ui';
  uctx.fillText('Lv'+tw.lv+'  '+'★'.repeat(tw.lv)+'☆'.repeat(5-tw.lv),px+12,py+58);
  // 説明
  uctx.fillStyle='#bcd'; uctx.font='11px system-ui'; wrapText(def.desc,px+12,py+76,pw-24,14);
  // ステータス
  uctx.fillStyle='#9ab'; uctx.font='11px system-ui';
  uctx.fillText(def.dmg>0?('射程 '+Math.round(st.range)+'   威力 '+Math.round(st.dmg)+'   間隔 '+st.cd.toFixed(2)+'s'):('射程 '+Math.round(st.range)+'   支援/特殊'),px+12,py+112);
  // ボタン（大きくタップしやすく）
  const canTarget = def.dmg>0 && def.atkType!=='barrier' && def.atkType!=='buff';
  let by=py+118;
  if(canTarget){ const TL={first:'先頭',last:'最後尾',strong:'最強',weak:'瀕死'};
    drawBtn('btnTarget',px+10,by,pw-20,24,'狙い：'+TL[tw.targetMode||'first']+'  ◀ ▶','#244a5a');
    by+=30; }
  if(tw.lv<5){ const cost=upCost(def,tw.lv); const can=G.parts>=cost;
    drawBtn('btnUpgrade',px+10,by,pw-20,40,'⬆ 強化  Lv'+(tw.lv+1)+'  ⚙'+cost, can?'#2a7a3a':'#26342a', !can);
  } else drawBtn('btnUpgrade',px+10,by,pw-20,40,'★ 最大レベル','#3a3a2a',true);
  drawBtn('btnSell',px+10,by+44,pw-20,28,'売却  ⚙'+sellValue(tw),'#5a3a2a');
}
function wrapText(text,x,y,maxw,lh){
  const chars=text.split(''); let line='',yy=y;
  for(const ch of chars){ if(uctx.measureText(line+ch).width>maxw){ uctx.fillText(line,x,yy); line=ch; yy+=lh; } else line+=ch; }
  uctx.fillText(line,x,yy);
}

  if(typeof DRC_RANKS!=='undefined'){ const rk=DRC_RANKS[Math.min(DRC_RANKS.length-1,Math.floor(G.wave/4))];
    uctx.fillStyle='#ffae54'; uctx.font='italic 15px system-ui'; uctx.fillText('討伐評価：'+rk, W/2, 236); }
  const rec=(G.wave>=G.best)||(G.score>=G.bestScore&&G.score>0);
  uctx.fillStyle='#ffd23f'; uctx.font='14px system-ui';
  uctx.fillText((rec?'★ 自己ベスト更新！　':'')+'最高W'+G.best+' / 最高得点 '+G.bestScore.toLocaleString(),W/2,260);

/* ============================================================================
   入力（タップ＝マウス/タッチ共通）
   ============================================================================ */
function toLogical(clientX, clientY){
  const r=ux.getBoundingClientRect();
  const sx=W/r.width, sy=H/r.height;
  return { x:(clientX-r.left)*sx, y:(clientY-r.top)*sy };
}
function hit(id, x,y){ const b=btnRects[id]; return b && x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h; }

function onTap(x,y){
  initAudio();
  if(G.scene==='title'){ if(hit('btnStart',x,y)){ startGame(); } return; }
  if(G.scene==='gameover'){ if(hit('btnRetry',x,y)){ startGame(); } return; }

  // HUDボタン
  if(hit('btnSpeed',x,y)){ G.speed=G.speed>=3?1:(G.speed===1?2:3); sfx.ui(); return; }
  if(hit('btnNext',x,y) && !G.waveActive){ startNextWave(true); sfx.ui(); return; }
  if(hit('btnPause',x,y)){ G.paused=!G.paused; sfx.ui(); return; }
  if(hit('btnMute',x,y)){ toggleMute(); return; }
  // 兵器ハンバーガー開閉
  if(!G.barOpen && hit('btnBar',x,y)){ G.barOpen=true; sfx.ui(); return; }
  if(G.barOpen){
    if(hit('btnBarClose',x,y)){ G.barOpen=false; sfx.ui(); return; }
    if(y>=HUD_H && y<BAR_Y){ G.barOpen=false; sfx.ui(); return; }   // 暗幕タップで閉じる
  }

  // タワーパネルのボタン
  if(G.selectedTower){
    const stw=G.selectedTower, sdef=stw.def;
    const canT=sdef.dmg>0 && sdef.atkType!=='barrier' && sdef.atkType!=='buff';
    if(canT && hit('btnTarget',x,y)){ const order=['first','last','strong','weak']; const ci=order.indexOf(stw.targetMode||'first'); stw.targetMode=order[(ci+1)%order.length]; sfx.ui(); return; }
    if(hit('btnUpgrade',x,y)){ upgradeTower(stw); return; }
    if(hit('btnSell',x,y)){ sellTower(stw); return; }
  }

  // 下の兵器バー
  if(y>=BAR_Y){
    for(const b of palBtns){ if(b && x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h){
      G.selectedPalette = (G.selectedPalette===b.key)?null:b.key; G.selectedTower=null; G.barOpen=false; sfx.ui(); return; } }
    return;
  }

  // 戦場（screen→world: +camX）
  if(y>=FIELD.y && y<BAR_Y){
    let gx=Math.floor((x+G.camX-OX)/CELL), gy=Math.floor((y-OY)/CELL);
    gx=Math.max(0,Math.min(WCOLS-1,gx)); gy=Math.max(0,Math.min(ROWS-1,gy));
    if(G.selectedPalette){
      if(placeTower(G.selectedPalette,gx,gy)){ if(G.parts<TOWER_BY_KEY[G.selectedPalette].cost) G.selectedPalette=null; }
      return;
    }
    const tw=towerAtCell(gx,gy);
    if(tw){ G.selectedTower=(G.selectedTower===tw)?null:tw; sfx.ui(); }
    else { G.selectedTower=null; }
  }
}
// lift=指の腹で隠れるのを避けるための上方向オフセット(論理px)。タッチ配置時のみ非0。
function onMove(x,y,lift){
  lift = lift||0;
  // 対象＝指の真下のマス（全行が確実に置ける）。ゴーストだけ上に浮かせて見せる
  if(G.selectedPalette && y>=FIELD.y && y<BAR_Y){
    let gx=Math.floor((x+G.camX-OX)/CELL), gy=Math.floor((y-OY)/CELL);
    gx=Math.max(0,Math.min(WCOLS-1,gx)); gy=Math.max(0,Math.min(ROWS-1,gy));
    G.hoverCell = {gx,gy};
  } else G.hoverCell=null;
  // ゴースト砲塔：指の lift px 上に浮かせて描画（指で隠れたマスを見せる）。world座標
  G.placeGhost = (G.selectedPalette && lift>0) ? {x:x+G.camX, y:y-lift} : null;
}
function inBar(y){ return y>=BAR_Y; }
const LIFT_PX = 40;               // 指より上に砲塔とプレビューを浮かせる量（端も置けるよう控えめ）
function clampCam(x){ return Math.max(0, Math.min(WORLD_W-W, x)); }
function placeLift(p){ return (G.selectedPalette && p.y>=FIELD.y && p.y<BAR_Y) ? LIFT_PX : 0; }
// ---- マウス：ドラッグで戦場パン／離した時クリック確定／ホイールでスクロール ----
let mDown=null, mDrag=false, mCam0=0;
function camCur(){ return G.camTarget==null?G.camX:G.camTarget; }
ux.addEventListener('mousedown',e=>{ const p=toLogical(e.clientX,e.clientY); mDown=p; mDrag=false; mCam0=camCur(); onMove(p.x,p.y,placeLift(p)); });
ux.addEventListener('mousemove',e=>{ const p=toLogical(e.clientX,e.clientY);
  if(mDown){ if(Math.abs(p.x-mDown.x)>6||Math.abs(p.y-mDown.y)>6) mDrag=true;
    if(mDrag && !G.selectedPalette && mDown.y>=FIELD.y && mDown.y<BAR_Y){ G.camTarget=clampCam(mCam0-(p.x-mDown.x)); G.camDrag=true; } }
  onMove(p.x,p.y,placeLift(p)); });
ux.addEventListener('mouseup',e=>{ if(mDown && !mDrag) onTap(mDown.x,mDown.y); mDown=null; mDrag=false; G.camDrag=false; });
ux.addEventListener('wheel',e=>{ const p=toLogical(e.clientX,e.clientY); e.preventDefault();
  if(inBar(p.y)) palScroll+=(e.deltaY+e.deltaX); else G.camTarget=clampCam(camCur()+(Math.abs(e.deltaX)>Math.abs(e.deltaY)?e.deltaX:e.deltaY)); },{passive:false});
// ---- タッチ：非配置=パン / 配置=リフトオフ＋端でエッジスクロール / バー=横スクロール ----
let tStart=null, tDragged=false, tScroll0=0, tCam0=0, tPlacing=false, tPanning=false;
ux.addEventListener('touchstart',e=>{ e.preventDefault(); const c=e.changedTouches[0]; const p=toLogical(c.clientX,c.clientY);
  tStart=p; tDragged=false; tScroll0=palScroll; tCam0=camCur();
  tPlacing = !!(G.selectedPalette && p.y>=FIELD.y && p.y<BAR_Y);
  tPanning = (!G.selectedPalette && p.y>=FIELD.y && p.y<BAR_Y);
  onMove(p.x,p.y, tPlacing?LIFT_PX:0); },{passive:false});
ux.addEventListener('touchmove',e=>{ e.preventDefault(); const c=e.changedTouches[0]; const p=toLogical(c.clientX,c.clientY);
  if(tStart){ const dx=p.x-tStart.x, dy=p.y-tStart.y;
    if(Math.abs(dx)>8||Math.abs(dy)>8) tDragged=true;
    if(inBar(tStart.y)) palScroll=tScroll0-(p.x-tStart.x);
    else if(tPanning){ G.camTarget=clampCam(tCam0-(p.x-tStart.x)); G.camDrag=true; }
    else if(tPlacing){ if(p.x<W*0.10) G.camTarget=clampCam(camCur()-9); else if(p.x>W*0.90) G.camTarget=clampCam(camCur()+9); } }
  onMove(p.x,p.y, tPlacing?LIFT_PX:0); },{passive:false});
ux.addEventListener('touchend',e=>{ e.preventDefault();
  if(tPlacing){ if(G.hoverCell){ const {gx,gy}=G.hoverCell;
      if(placeTower(G.selectedPalette,gx,gy)){ if(G.parts<TOWER_BY_KEY[G.selectedPalette].cost) G.selectedPalette=null; } } }
  else if(tStart && !tDragged){ onTap(tStart.x,tStart.y); }
  tStart=null; tPlacing=false; tPanning=false; G.camDrag=false; G.hoverCell=null; G.placeGhost=null; },{passive:false});

function toast(msg){ G.toast=msg; G.toastT=4.2; }   // 実時間で減衰（loop側）。早送りでも読める

  G.partsDisp=G.parts; G.scoreDisp=0; G.hpDisp=G.baseHP; G.fade=1; G.kills=0; G.maxCombo=0; G.playT=0;
  G.hitStop=0; G.announce=null; G.announceT=0;

  G.camX = WORLD_W - W; G.camTarget = G.camX; G.camVel=0; G.camDrag=false; G.camPrev=G.camX;   // 開幕は右端（侵攻方向）

/* ============================================================================
   メインループ（固定ステップ＋速度倍率）
   ============================================================================ */
let last=performance.now(), acc=0; const STEP=1/60; const MAX_ACC=STEP*5;
// タブ非表示→復帰時の累積暴走（スパイラルオブデス）を防止
document.addEventListener('visibilitychange', function(){ if(!document.hidden){ last=performance.now(); acc=0; } });
function loop(now){
  let frame=(now-last)/1000; last=now; if(frame<0) frame=0; if(frame>0.25)frame=0.25;
  if(G.hitStop>0){ G.hitStop-=frame; }               // ヒットストップ中は更新を止めるがaccは据え置く（時間欠落なし）
  else if(!G.paused){ acc += frame * (G.scene==='playing'?G.speed:1) * ((G.slowmo||0)>0?0.35:1);  // 弾丸時間
    if(acc>MAX_ACC) acc=MAX_ACC;                 // 1フレームのupdate回数を上限化
    while(acc>=STEP){ update(STEP); acc-=STEP; } }
  const t=now/1000;
  // トースト・アナウンサーは実時間で減衰
  if(G.toastT>0) G.toastT-=frame;
  if(G.announceT>0) G.announceT-=frame;
  // 弾丸時間・全画面閃光は実時間で減衰
  if(G.slowmo>0) G.slowmo-=frame;
  if(G.flash>0) G.flash-=frame*2.5;
  // HUD数値のカウントアップ＋シーンフェード（作品感）
  G.partsDisp += (G.parts-(G.partsDisp||0))*Math.min(1,frame*12);
  G.scoreDisp += (G.score-(G.scoreDisp||0))*Math.min(1,frame*10);
  G.hpDisp += (G.baseHP-(G.hpDisp||0))*Math.min(1,frame*8);
  if(G.fade>0) G.fade-=frame*1.6;
  if(G.scene==='playing' && !G.paused) G.playT=(G.playT||0)+frame*G.speed;
  // カメラ慣性＋スムージング（指を離してもすべる／追従が滑らか）
  if(G.camTarget==null) G.camTarget=G.camX;
  if(G.camDrag){ G.camVel=(G.camTarget-(G.camPrev==null?G.camTarget:G.camPrev)); G.camPrev=G.camTarget; }
  else if(Math.abs(G.camVel||0)>0.3){ G.camTarget=clampCam(G.camTarget+G.camVel); G.camVel*=0.90; }
  else G.camVel=0;
  G.camX += (G.camTarget-G.camX)*Math.min(1, frame*16);
  // 画面振動（ボス出現・撃破・被弾）
  if(G.shake>0.3){ G.shake*=0.86; } else G.shake=0;
  const sx=(Math.random()-0.5)*G.shake, sy=(Math.random()-0.5)*G.shake;
  const VS=VIEWSCALE;
  ctx.setTransform(VS,0,0,VS, (sx-G.camX)*VS, sy*VS);   // 横スクロール(camX)を1点合成
  drawField(t);
  uctx.setTransform(VS,0,0,VS,0,0);
  drawUI(t);
  if(G.fade>0){ uctx.fillStyle='rgba(5,7,12,'+Math.min(1,G.fade)+')'; uctx.fillRect(0,0,W,H); }   // シーン遷移フェード
  requestAnimationFrame(loop);
}

let actx=null, master=null;
function initAudio(){
  if(actx) return;
  try{ const AC=window.AudioContext||window.webkitAudioContext; actx=new AC();
    master=actx.createGain(); master.gain.value=G.muted?0:0.34;
    const comp=actx.createDynamicsCompressor(); comp.threshold.value=-14; comp.knee.value=8; comp.ratio.value=12; comp.attack.value=0.003; comp.release.value=0.18;
    master.connect(comp); comp.connect(actx.destination);   // 密集時のピーク歪みを抑える
  }catch(e){ actx=null; }
}
function toggleMute(){ G.muted=!G.muted; if(master)master.gain.value=G.muted?0:0.34; }
function tone(freq,start,dur,type,vol,toFreq){
  if(!actx)return; const o=actx.createOscillator(),g=actx.createGain();
  o.type=type||'square'; o.frequency.setValueAtTime(freq,start);
  if(toFreq)o.frequency.exponentialRampToValueAtTime(Math.max(20,toFreq),start+dur);
  g.gain.setValueAtTime(0.0001,start); g.gain.linearRampToValueAtTime(vol,start+0.005);
  g.gain.exponentialRampToValueAtTime(0.0006,start+dur);
  o.connect(g); g.connect(master); o.start(start); o.stop(start+dur+0.02);
}
function noise(start,dur,vol,filt){
  if(!actx)return; const n=actx.createBufferSource();
  const buf=actx.createBuffer(1,actx.sampleRate*dur,actx.sampleRate); const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1); n.buffer=buf;
  const g=actx.createGain(); g.gain.setValueAtTime(vol,start); g.gain.exponentialRampToValueAtTime(0.001,start+dur);
  const f=actx.createBiquadFilter(); f.type=filt||'lowpass'; f.frequency.value=filt==='highpass'?2000:900;
  n.connect(f); f.connect(g); g.connect(master); n.start(start); n.stop(start+dur);
}
const _t=()=> actx?actx.currentTime:0;
let lastSfx={};
function throttle(name,ms){ const now=performance.now(); if(lastSfx[name]&&now-lastSfx[name]<ms)return false; lastSfx[name]=now; return true; }

// BGM
const TUNES={ battle:{ tempo:0.135,
  lead:[['A4',2],['A4',1],['C5',1],['A4',2],['E5',2],['D5',1],['C5',1],['B4',2],['A4',2],
        ['A4',2],['A4',1],['C5',1],['E5',2],['G5',2],['F5',1],['E5',1],['D5',2],['C5',2]],
  bass:[['A2',1],['A2',1],['A2',1],['A2',1],['A2',1],['A2',1],['A2',1],['A2',1],
        ['F2',1],['F2',1],['F2',1],['F2',1],['G2',1],['G2',1],['G2',1],['G2',1],
        ['A2',1],['A2',1],['A2',1],['A2',1],['A2',1],['A2',1],['A2',1],['A2',1],
        ['E2',1],['E2',1],['E2',1],['E2',1],['G2',1],['G2',1],['G2',1],['G2',1]] } };
const NB={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
function nf(n){ const m=n.match(/^([A-G])(#?)(\d)$/); if(!m)return 0; const s=NB[m[1]]+(m[2]?1:0)+(+m[3]-4)*12; return 440*Math.pow(2,(s-9)/12); }
let bgm=null,bgmT=null;
function trackLen(seq,tempo){ let l=0; for(const[,s]of seq)l+=s*tempo; return l; }
function kick(at){ if(!actx)return; tone(120,at,0.12,'sine',0.30,40); noise(at,0.04,0.08); }
function hat(at){ if(!actx)return; noise(at,0.025,0.05,'highpass'); }
function schedBgm(){ if(!actx||!bgm)return; const tn=TUNES[bgm]; const t0=actx.currentTime+0.06;
  // リード（厚みのためオクターブ重ね）
  let t=t0; for(const[n,s]of tn.lead){ const d=s*tn.tempo; if(n){ tone(nf(n),t,d*0.95,'sawtooth',0.055); tone(nf(n)*2,t,d*0.5,'square',0.018);} t+=d; }
  // ベース（サブ重ね）
  t=t0; for(const[n,s]of tn.bass){ const d=s*tn.tempo; if(n){ tone(nf(n),t,d*0.92,'triangle',0.11); tone(nf(n)/2,t,d*0.9,'sine',0.06);} t+=d; }
  // 4つ打ちキック＋裏ハイハット
  const total=trackLen(tn.lead,tn.tempo), beat=tn.tempo*2; let b=0;
  for(let bt=0; bt<total-0.001; bt+=beat){ kick(t0+bt); if(b%2===1) hat(t0+bt+beat/2); b++; }
  bgmT=setTimeout(schedBgm, total*1000-30); }
function playBgm(n){ if(!actx)return; if(!TUNES[n])n='battle'; if(bgm===n)return; stopBgm(); bgm=n; schedBgm(); }
function stopBgm(){ bgm=null; if(bgmT){clearTimeout(bgmT);bgmT=null;} }

buildWave = function(n){
  const tier=Math.min(ENEMY_DEFS.length-5, Math.floor(n*0.9));
  const hpMul=1+(n-1)*0.075+Math.pow(n/13,2)*0.4;
  const spdMul=1+Math.min(0.55,(n-1)*0.012);
  const rewardMul=1+(n-1)*0.03;
  const count=8+Math.floor(n*1.5);
  const q=[]; const lo=Math.max(0,tier-10), hi=Math.min(ENEMY_DEFS.length-6,tier+2);
  for(let i=0;i<count;i++){ const idx=lo+Math.floor(Math.random()*(hi-lo+1)); q.push({def:ENEMY_DEFS[idx],hpMul,spdMul,rewardMul,gap:0.55+Math.random()*0.25}); }
  if(n%10===0){ const bp=ENEMY_DEFS.slice(-5); const boss=bp[Math.floor((n/10-1)%bp.length)];
    q.push({def:boss,hpMul:hpMul*(1+n/40),spdMul:spdMul*0.8,rewardMul:rewardMul*2,gap:0.1,boss:true}); }
  return q;
};

    while(placed<adds && tries<400){ tries++;
      const gx=2+((Math.random()*(WCOLS-4))|0), gy=(Math.random()*ROWS)|0;

      const i=idxOf(gx,gy); if(occ[i]) continue;
      if(!reachableAfter(gx,gy)) continue;        // 全封鎖は禁止
      occ[i]=1; changed=true; placed++;
      const N=[[1,0],[-1,0],[0,1],[0,-1],[0,0]];
      for(const d of N){ const nx=gx+d[0], ny=gy+d[1];
        if(nx<0||ny<0||nx>=WCOLS||ny>=ROWS||nx===GOAL_GX) continue; G.lava.add(idxOf(nx,ny)); }
      const c=cellCenter(gx,gy); fxExplode(c.x,c.y,'#ff7a2a',1.4);
    } }
  if(n>=3 && G.towers && G.towers.length){            // プレイヤーの防壁を1つ強制粉砕＝陣地を超える
    const tw=G.towers[(Math.random()*G.towers.length)|0];
    if(tw){ occ[idxOf(tw.gx,tw.gy)]=0;
      const ix=G.towers.indexOf(tw); if(ix>=0) G.towers.splice(ix,1);

const _abKill=killEnemy; killEnemy=function(e){
  const doSplit = e && e.split && !e.isChild && !e.dead;
  const px=e?e.x:0, py=e?e.y:0, bs=e?e.baseSpeed:0, pr=e?e.prog:9999, def=e?e.def:null, e2=e;
  _abKill(e);
  if(doSplit && def){ for(let i=0;i<2;i++){
    G.enemies.push({ def, name:e2.name, arch:e2.arch, domain:e2.domain, color:e2.color, size:e2.size*0.66,
      maxhp:e2.maxhp*0.3, hp:e2.maxhp*0.3, speed:bs*1.15, baseSpeed:bs*1.15,
      armor:(e2.armor||0)*0.5, reward:Math.max(1,Math.round((e2.reward||2)*0.3)), leak:Math.max(1,Math.round((e2.leak||1)*0.4)),
      x:px+(i?13:-13), y:py+(i?9:-9), vx:-1,vy:0, ang:Math.PI, prog:pr, seed:Math.random()*6.28,
      slowT:0,stunT:0,dots:[],boss:false,hitFlash:0,dead:false, isChild:true,
      ability:null,shield:0,regen:false,split:false,haste:false }); } }
};
const _abUpdate=update; update=function(dt){ _abUpdate(dt);
  if(G.scene!=='playing') return;
  for(const e of G.enemies){ if(e.dead) continue;
    if(e.regen && e.hp<e.maxhp && (e.hitFlash||0)<=0) e.hp=Math.min(e.maxhp, e.hp + e.maxhp*0.05*dt);
    if(e.haste && !e.hasted && (e.prog||999) < WCOLS*0.45){ e.hasteMul=1.55; e.hasted=true; } }
};
const _abDraw=drawEnemy; drawEnemy=function(e,t){ _abDraw(e,t);
  const yy = e.domain==='air'? e.y-26 : e.y;
  if(e.shield>0){ ctx.save(); ctx.globalAlpha=0.35+0.2*Math.sin(t*6+e.seed); ctx.strokeStyle='#5ad0ff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(e.x,yy,e.size*0.9,0,7); ctx.stroke(); ctx.restore(); }
  if(e.regen && e.hp<e.maxhp){ ctx.save(); ctx.globalAlpha=0.5+0.3*Math.sin(t*8+e.seed); ctx.fillStyle='#5fffa0';
    ctx.fillRect(e.x-1,yy-e.size-13,2,8); ctx.fillRect(e.x-4,yy-e.size-10,8,2); ctx.restore(); }
  if(e.hasted){ ctx.save(); ctx.strokeStyle='rgba(255,220,120,0.5)'; ctx.lineWidth=2;
    for(let k=0;k<3;k++){ ctx.beginPath(); ctx.moveTo(e.x+e.size*0.6+k*5, yy-6+k*5); ctx.lineTo(e.x+e.size*1.15+k*5, yy-6+k*5); ctx.stroke(); } ctx.restore(); }
};
const _abWave=buildWave; buildWave=function(n){ const q=_abWave(n); if(n<3) return q;
  const pat=n%4;
  if(pat===1){ for(const s of q) s.gap*=0.6;
    const extra=Math.floor(q.length*0.5);
    for(let i=0;i<extra;i++){ const d=ENEMY_DEFS[1+((Math.random()*8)|0)]; q.push({def:d,hpMul:q[0].hpMul*0.85,spdMul:q[0].spdMul*1.2,rewardMul:q[0].rewardMul,gap:0.3}); } }
  else if(pat===3){ const air=ENEMY_DEFS.filter(d=>d.domain==='air'); if(air.length)
    for(const s of q){ if(!s.boss && Math.random()<0.55) s.def=air[(Math.random()*air.length)|0]; } }
  return q; };
// 飛行機（空中敵）はウェーブ15以降のみ出現。15未満は地上敵へ差し替え
const _airGateWave=buildWave; buildWave=function(n){ const q=_airGateWave(n);
  if(n<15){ const ground=ENEMY_DEFS.slice(0, Math.max(1,ENEMY_DEFS.length-5)).filter(d=>d.domain!=='air');
    if(ground.length) for(const s of q){ if(s && s.def && s.def.domain==='air'){ s.def=ground[(Math.random()*ground.length)|0]; } } }
  return q; };

requestAnimationFrame(loop);
</script>
